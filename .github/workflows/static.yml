# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate precache-manifest.js
        # sw.js's offline file list is derived from the repo tree (see
        # scripts/build_precache.py) rather than hand-maintained, so it can
        # never silently drift out of date the way the old hard-coded list
        # did. Regenerating here — instead of trusting the committed copy —
        # means a contributor who forgot to run the script locally still
        # ships a correct, up-to-date manifest.
        run: python3 scripts/build_precache.py
      - name: Prepare deploy directory
        # Only publish the runtime app — never the backend source, docs,
        # scripts, tests, PDFs, or archives. See .pagesignore for the list.
        run: |
          mkdir -p _site
          rsync -a --exclude-from='.pagesignore' ./ _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
