<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DCAS CPG 2025 · Full Index</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Shared stylesheet (contains all themes and components) -->
    <link rel="stylesheet" href="../styles.css">
    
    <!-- PWA Manifest and icons -->
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0056b3">
    <link rel="apple-touch-icon" href="../icons/icon.png">

    <style>
        /* ── Float buttons ── */
        .float-btn { position: fixed; width: 40px; height: 40px; border-radius: 50%; background: rgba(61,100,115,0.7); color: white; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: transform 0.2s, background 0.2s, opacity 0.2s; z-index: 999; backdrop-filter: blur(2px); opacity: 0.8; }
        .float-btn:hover { transform: scale(1.1); background: var(--toggle-active); opacity: 1; }
        .float-btn:active { transform: scale(0.95); }
        .float-btn.hidden { opacity: 0; pointer-events: none; }
        #scrollToBottomBtn { bottom: 20px; right: 15px; }
        #scrollToTopBtn   { bottom: 70px; right: 15px; }
        /* hide bottom nav — not needed on the index page */
        .bottom-nav { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <button class="icon-btn" id="homeBtn">
            <svg width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="header-text">
            <h1 id="pageTitle">DCAS CPG Index</h1>
            <p id="pageSubtitle">Complete Table of Contents</p>
        </div>
    </div>
    <div class="header-right">
        <button class="icon-btn" id="themeToggle" title="Switch Theme"><svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#palette'/></svg></button>
        <div class="stats-badge" id="liveStatsBadge">
            <span><svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#chart-no-axes-column'/></svg> <span id="statsAttempts">0</span></span>
            <div class="stats-divider"></div>
            <span><svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#target'/></svg> <span id="statsCritical">0%</span></span>
        </div>
        <a href="c-index.html?view=summary" class="icon-btn" id="headerIndexBtn" title="Index"><svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#clipboard-list'/></svg></a>
        <a href="../pages/about.html" class="icon-btn" id="headerAboutBtn" title="About"><svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-help'/></svg></a>
    </div>
</header>

<main id="mainContent">
    <!-- Content will be injected by app.js -->
</main>

<footer>
    <div>Created by Soliman Anas · for study aid only</div>
    <div><a href="../pages/about.html">About & Disclaimer</a> · Refer to DCAS CPG and memo for procedures and protocols.</div>
</footer>

<button class="float-btn hidden" id="scrollToTopBtn" title="Go to top"><svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-up'/></svg></button>
<button class="float-btn" id="scrollToBottomBtn" title="Go to bottom"><svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-down'/></svg></button>

<!-- Load chapter content data first, then app.js to render it -->
<script src="../content/c-index.js"></script>
<script src="../app.js"></script>

<script>
    (function() {
        const themeBtn = document.getElementById('themeToggle');
        const html = document.documentElement;
        const themes = ['dark', 'light', 'sepia', 'forest'];
        
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
        }

        function nextTheme() {
            const current = html.getAttribute('data-theme') || 'dark';
            const currentIndex = themes.indexOf(current);
            const nextIndex = (currentIndex + 1) % themes.length;
            const next = themes[nextIndex];
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        if (themeBtn) {
            themeBtn.addEventListener('click', nextTheme);
        }
        initTheme();

        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = '../index.html';
        });

        function loadStats() {
            try {
                const data = localStorage.getItem('dcas_cpg_stats');
                const stats = data ? JSON.parse(data) : { totalAttempts: 0, critical: { total: 0, correct: 0 } };
                const critAcc = stats.critical.total ? Math.round((stats.critical.correct / stats.critical.total) * 100) : 0;
                document.getElementById('statsAttempts').innerText = stats.totalAttempts || 0;
                document.getElementById('statsCritical').innerText = `${critAcc}%`;
            } catch(e) {}
        }
        loadStats();

        // ── Float Buttons ──
        const scrollTopBtn    = document.getElementById('scrollToTopBtn');
        const scrollBottomBtn = document.getElementById('scrollToBottomBtn');

        function updateFloatButtons() {
            const scrollY = window.scrollY;
            const winH    = window.innerHeight;
            const docH    = document.documentElement.scrollHeight;
            if (scrollTopBtn) {
                scrollTopBtn.classList.toggle('hidden', scrollY <= 200);
            }
            if (scrollBottomBtn) {
                scrollBottomBtn.classList.toggle('hidden', docH - (scrollY + winH) <= 100);
            }
        }
        window.addEventListener('scroll', updateFloatButtons);
        window.addEventListener('resize', updateFloatButtons);
        updateFloatButtons();

        if (scrollTopBtn) {
            scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }
        if (scrollBottomBtn) {
            scrollBottomBtn.addEventListener('click', () => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            });
        }
    })();
</script>

<!-- Service Worker Registration (optional, can remain) -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('../sw.js')
                .then(reg => console.log('PWA Ready!', reg))
                .catch(err => console.log('PWA Failed', err));
        });
    }
</script>
</body>
</html>
