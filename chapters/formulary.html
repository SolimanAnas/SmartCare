    <!-- Drug monograph card system — scoped to this chapter only.
         Colors mirror the category palette already used in the Medication
         Index/Calculator (pages/drug-data.json) so a drug reads the same
         color everywhere in the app. Contraindication/Precaution/Indication
         boxes use fixed red/amber/green across all themes on purpose: they
         encode clinical severity, not a decorative accent, and that meaning
         shouldn't shift when someone switches to light or sepia mode. -->
    <style>
        :root{
            --rx-stop: #ef4444;
            --rx-stop-bg: rgba(239,68,68,.08);
            --rx-caution: #f59e0b;
            --rx-caution-bg: rgba(245,158,11,.08);
            --rx-go: #22c55e;
            --rx-go-bg: rgba(34,197,94,.08);
            --rx-info: #38bdf8;
            --rx-info-bg: rgba(56,189,248,.08);
        }
        .rx-card{
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px 22px 22px;
            margin-bottom: 20px;
            overflow: hidden;
            animation: fadeInUp .5s ease both;
        }
        .rx-topbar{
            position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: var(--rx-cat);
        }
        .rx-head{ display: flex; align-items: flex-start; gap: 14px; margin-bottom: 18px; }
        .rx-head-icon{
            width: 44px; height: 44px; flex-shrink: 0; border-radius: 13px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; color: var(--rx-cat);
            background: color-mix(in srgb, var(--rx-cat) 15%, transparent);
            border: 1px solid color-mix(in srgb, var(--rx-cat) 35%, transparent);
        }
        .rx-head-text{ flex: 1; min-width: 0; }
        .rx-eyebrow{
            font-size: .68rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: .8px; color: var(--rx-cat); margin-bottom: 4px;
        }
        .rx-name{ font-size: 1.35rem; font-weight: 800; color: var(--text-primary); line-height: 1.25; }
        .rx-scope{ flex-shrink: 0; text-align: right; width: 92px; cursor: help; }
        .rx-scope-badge{
            display: inline-block; font-size: .66rem; font-weight: 800;
            color: var(--text-primary); white-space: nowrap;
        }
        .rx-scope-bar{
            margin-top: 5px; height: 4px; border-radius: 4px;
            background: color-mix(in srgb, var(--text-secondary) 20%, transparent);
            overflow: hidden;
        }
        .rx-scope-bar span{
            display: block; height: 100%; min-width: 4px;
            background: var(--rx-cat); border-radius: 4px;
        }
        .rx-quickfacts{
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-bottom: 16px;
        }
        .rx-fact{
            background: color-mix(in srgb, var(--text-primary) 4%, transparent);
            border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 9px 12px;
        }
        .rx-fact-lbl{
            display: block; font-size: .6rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: .5px; color: var(--text-secondary); margin-bottom: 3px;
        }
        .rx-fact-val{ display: block; font-size: .82rem; color: var(--text-primary); line-height: 1.4; }
        .rx-moa{
            font-size: .87rem; line-height: 1.6; color: var(--text-secondary);
            font-style: italic; margin-bottom: 18px; padding-left: 12px;
            border-left: 2px solid var(--glass-border);
        }
        .rx-box{
            border-radius: 12px; padding: 13px 16px; margin-bottom: 12px;
            border: 1px solid; border-left-width: 4px;
        }
        .rx-box h4{
            display: flex; align-items: center; gap: 6px;
            font-size: .72rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: .5px; margin-bottom: 6px;
        }
        .rx-box p{ font-size: .85rem; line-height: 1.55; color: var(--text-primary); margin: 0; }
        .rx-box-go{ background: var(--rx-go-bg); border-color: color-mix(in srgb, var(--rx-go) 35%, transparent); border-left-color: var(--rx-go); }
        .rx-box-go h4{ color: var(--rx-go); }
        .rx-box-stop{ background: var(--rx-stop-bg); border-color: color-mix(in srgb, var(--rx-stop) 35%, transparent); border-left-color: var(--rx-stop); }
        .rx-box-stop h4{ color: var(--rx-stop); }
        .rx-box-caution{ background: var(--rx-caution-bg); border-color: color-mix(in srgb, var(--rx-caution) 35%, transparent); border-left-color: var(--rx-caution); }
        .rx-box-caution h4{ color: var(--rx-caution); }
        .rx-box-info{ background: var(--rx-info-bg); border-color: color-mix(in srgb, var(--rx-info) 35%, transparent); border-left-color: var(--rx-info); }
        .rx-box-info h4{ color: var(--rx-info); }
        .rx-dose-grid{
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-bottom: 12px;
        }
        .rx-dose-card{
            background: color-mix(in srgb, var(--primary-accent) 8%, transparent);
            border: 1px solid color-mix(in srgb, var(--primary-accent) 30%, transparent);
            border-radius: 12px; padding: 13px 14px;
        }
        .rx-dose-card h4{
            display: flex; align-items: center; gap: 6px;
            font-size: .68rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: .5px; color: var(--primary-accent); margin-bottom: 6px;
        }
        .rx-dose-card p{ font-size: .84rem; line-height: 1.55; color: var(--text-primary); margin: 0; }
        .rx-two-col{
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-bottom: 12px;
        }
        .rx-mini{
            background: color-mix(in srgb, var(--text-primary) 4%, transparent);
            border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 12px 14px;
        }
        .rx-mini h4{
            font-size: .66rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: .5px; color: var(--text-secondary); margin-bottom: 5px;
        }
        .rx-mini p{ font-size: .78rem; line-height: 1.5; color: var(--text-primary); margin: 0; }
        @media (max-width: 560px){
            .rx-quickfacts, .rx-dose-grid, .rx-two-col{ grid-template-columns: 1fr; }
            .rx-name{ font-size: 1.15rem; }
        }
        @media (prefers-reduced-motion: reduce){
            .rx-card{ animation: none; }
        }
    </style>

<script>
    (function() {

        document.getElementById('homeBtn').addEventListener('click', () => {
            window.location.href = '../index.html';
        });

        function loadStats() {
            try {
                const data = localStorage.getItem('smartcare_cpg_stats');
                const stats = data ? JSON.parse(data) : { totalAttempts: 0, critical: { total: 0, correct: 0 } };
                const critAcc = stats.critical.total ? Math.round((stats.critical.correct / stats.critical.total) * 100) : 0;
                document.getElementById('statsAttempts').innerText = stats.totalAttempts || 0;
                document.getElementById('statsCritical').innerText = `${critAcc}%`;
            } catch(e) {}
        }
        loadStats();
    })();
</script>
