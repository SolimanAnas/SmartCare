<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DCAS CPG 2025 · Drug Index</title>
<script>
  (function(){
    var t=localStorage.getItem('theme')||'dark';
    document.documentElement.setAttribute('data-theme',t);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   DCAS Drug Index — Quick Reference
═══════════════════════════════════════════════════════════ */
:root{
  --bg:#07111f;--sf:rgba(255,255,255,.055);--sf2:rgba(255,255,255,.09);
  --br:rgba(255,255,255,.10);--br2:rgba(255,255,255,.18);
  --text:#e2e8f0;--muted:#64748b;
  --blue:#3b82f6;--green:#22c55e;
  --mono:"DM Mono",monospace;--hdr:60px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100%;display:flex;flex-direction:column;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background-image:radial-gradient(ellipse 90% 50% at 15% 0%,rgba(15,39,68,.8),transparent),radial-gradient(ellipse 60% 50% at 85% 100%,rgba(20,10,60,.6),transparent);pointer-events:none;z-index:-1}

/* ── HEADER ─────────────────────────────────── */
.app-header{height:var(--hdr);background:rgba(7,17,31,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:60;flex-shrink:0}
.hdr-back{width:36px;height:36px;border-radius:11px;background:var(--sf2);border:1px solid var(--br);color:var(--text);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:.85rem;flex-shrink:0;transition:background .15s}
.hdr-back:active{background:var(--br2)}
.hdr-info{flex:1}
.hdr-title{font-size:.93rem;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:.62rem;color:var(--muted)}

/* ── SEARCH STRIP ─────────────────────────────────── */
.search-strip{
  padding:10px 14px;
  background:rgba(7,17,31,.85);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--br);
  position:sticky;top:var(--hdr);z-index:55;flex-shrink:0;
}
.search-inner{
  display:flex;align-items:center;gap:10px;
  background:var(--sf2);border:1.5px solid var(--br);
  border-radius:12px;padding:9px 14px;transition:border-color .2s;
}
.search-inner:focus-within{border-color:rgba(59,130,246,.5)}
.search-icon{font-size:.85rem;color:var(--muted);flex-shrink:0}
.search-input{flex:1;background:transparent;border:none;outline:none;font-size:.88rem;font-family:inherit;color:var(--text)}
.search-input::placeholder{color:var(--muted)}
.search-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:2px;display:none}
.search-clear.visible{display:block}

/* ── PAGE BODY ──────────────────────────────────── */
.page-body{flex:1;overflow-y:auto;padding:16px 14px 40px;max-width:800px;width:100%;margin:0 auto}

/* ── ACTION BUTTON ────────────────────────────────── */
.action-card{
  display:block;text-decoration:none;color:inherit;
  background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);
  border-radius:16px;padding:18px 20px;margin-bottom:16px;
  transition:transform .2s,background .2s;
}
.action-card:hover{background:rgba(59,130,246,.14);transform:translateY(-2px)}
.action-card:active{transform:scale(.98)}
.action-icon{font-size:1.6rem;margin-bottom:8px;display:block}
.action-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:4px}
.action-sub{font-size:.78rem;color:var(--muted);line-height:1.4}

/* ── CATEGORY GRID ──────────────────────────────── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.cat-card{
  display:flex;flex-direction:column;align-items:center;text-align:center;
  padding:16px 10px;background:rgba(255,255,255,.04);border:1px solid var(--br);
  border-radius:14px;text-decoration:none;color:inherit;
  transition:transform .2s,background .2s;cursor:pointer;
}
.cat-card:hover{background:rgba(255,255,255,.07);transform:translateY(-2px)}
.cat-card:active{transform:scale(.97)}
.cat-icon{font-size:1.5rem;margin-bottom:6px}
.cat-name{font-size:.8rem;font-weight:700;margin-bottom:2px}
.cat-count{font-size:.65rem;color:var(--muted)}

.cat-card[data-cat="cardiac"]{border-color:rgba(239,68,68,.3)}
.cat-card[data-cat="airway"]{border-color:rgba(16,185,129,.3)}
.cat-card[data-cat="neuro"]{border-color:rgba(139,92,246,.3)}
.cat-card[data-cat="pain"]{border-color:rgba(249,115,22,.3)}
.cat-card[data-cat="metabolic"]{border-color:rgba(6,182,212,.3)}
.cat-card[data-cat="other"]{border-color:rgba(148,163,184,.3)}

/* ── DRUG LIST ───────────────────────────────────── */
.drug-section{margin-bottom:20px}
.drug-section-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;padding:8px 12px;
  background:rgba(255,255,255,.04);border:1px solid var(--br);
  border-radius:10px;border-left:3px solid var(--blue);
}
.drug-section-icon{font-size:1rem;flex-shrink:0}
.drug-section-title{font-size:.85rem;font-weight:700;flex:1}
.drug-section-count{font-size:.65rem;color:var(--muted);font-family:var(--mono)}

.drug-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;margin-bottom:6px;
  background:rgba(255,255,255,.03);border:1px solid var(--br);
  border-radius:10px;transition:background .15s;
}
.drug-item:hover{background:rgba(255,255,255,.06)}
.drug-badge{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
}
.drug-name{font-size:.85rem;font-weight:600;flex:1;color:var(--text)}
.drug-arrow{color:var(--muted);font-size:.7rem;opacity:.5}

/* ── EMPTY STATE ─────────────────────────────────── */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--muted);
}
.empty-icon{font-size:3rem;margin-bottom:12px;opacity:.6}
.empty-title{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:.85rem}

/* ── STATS BAR ──────────────────────────────────── */
.stats-bar{
  display:flex;justify-content:space-around;
  padding:14px 16px;margin-bottom:16px;
  background:rgba(255,255,255,.04);border:1px solid var(--br);
  border-radius:16px;
}
.stat-item{display:flex;flex-direction:column;align-items:center}
.stat-num{font-size:1.3rem;font-weight:800;color:var(--blue)}
.stat-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

[data-theme="light"]{
  --bg:#f8fafc;--text:#1e293b;--muted:#64748b;
  --sf:rgba(0,0,0,.04);--sf2:rgba(0,0,0,.07);
  --br:rgba(0,0,0,.1);--br2:rgba(0,0,0,.15);
}
[data-theme="light"] .app-header{background:rgba(248,250,252,.95)}
[data-theme="light"] .search-strip{background:rgba(248,250,252,.9)}
[data-theme="light"] .drug-item{background:rgba(0,0,0,.02)}
[data-theme="light"] .drug-item:hover{background:rgba(0,0,0,.05)}
[data-theme="light"] .stats-bar{background:rgba(0,0,0,.03)}

[data-theme="sepia"]{
  --bg:#f4ecd8;--text:#5c4033;--muted:#8b7355;
  --sf:rgba(92,64,51,.06);--sf2:rgba(92,64,51,.1);
  --br:rgba(92,64,51,.15);--br2:rgba(92,64,51,.2);
}
[data-theme="sepia"] .app-header{background:rgba(244,236,216,.95)}
[data-theme="sepia"] .search-strip{background:rgba(244,236,216,.9)}
</style>
</head>
<body>

<header class="app-header">
  <a href="../index.html" class="hdr-back">←</a>
  <div class="hdr-info">
    <div class="hdr-title">Drug Index</div>
    <div class="hdr-sub">Quick reference & formulary</div>
  </div>
</header>

<div class="search-strip">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Search drugs...">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
</div>

<main class="page-body">
  <a href="../chapters/m1-38.html" class="action-card">
    <span class="action-icon">💊</span>
    <div class="action-title">Complete Drug Formulary</div>
    <div class="action-sub">View full M1–38 formulary with dosages, indications, and adminstraton notes</div>
  </a>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <span class="stat-num" id="totalDrugs">0</span>
      <span class="stat-label">Drugs</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="totalCats">0</span>
      <span class="stat-label">Categories</span>
    </div>
  </div>

  <div class="cat-grid" id="catGrid"></div>

  <div id="drugList"></div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">💊</div>
    <div class="empty-title">No drugs found</div>
    <div class="empty-sub">Try a different search term</div>
  </div>
</main>

<script>
(function(){
  "use strict";

  const drugList = document.getElementById('drugList');
  const catGrid = document.getElementById('catGrid');
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const emptyState = document.getElementById('emptyState');
  const totalDrugs = document.getElementById('totalDrugs');
  const totalCats = document.getElementById('totalCats');

  let allDrugs = {};
  let allCategories = [];

  // Category config
  const catConfig = {
    'Cardiac / Resus':     { icon: '❤️', color: '#ef4444', key: 'cardiac' },
    'Airway / Respiratory': { icon: '🫁', color: '#10b981', key: 'airway' },
    'Neuro / Sedation':     { icon: '🧠', color: '#8b5cf6', key: 'neuro' },
    'Pain':                  { icon: '💊', color: '#f97316', key: 'pain' },
    'Metabolic / Fluids':     { icon: '💧', color: '#06b6d4', key: 'metabolic' },
    'Other Medications':      { icon: '🧪', color: '#94a3b8', key: 'other' }
  };

  async function loadData() {
    try {
      const resp = await fetch('drug-data.json'));
      const data = await resp.json();
      allCategories = data.categories || [];
      allDrugs = data.drugs || {};
      renderCategories(allCategories, allDrugs);
      renderCatGrid(allCategories, allDrugs);
      updateStats();
    } catch(e) {
      console.error('Failed to load drug data:', e);
    }
  }

  function updateStats() {
    const drugCount = Object.keys(allDrugs).length;
    const catCount = allCategories.length;
    totalDrugs.textContent = drugCount;
    totalCats.textContent = catCount;
  }

  function renderCatGrid(categories, drugs) {
    catGrid.innerHTML = '';
    categories.forEach(cat => {
      const config = catConfig[cat.name] || { icon: '💊', key: 'other' };
      const drugCount = (cat.drugs || []).length;

      const card = document.createElement('a');
      card.className = 'cat-card';
      card.href = `#cat-${cat.name.replace(/\s+/g,'-')}`;
      card.setAttribute('data-cat', config.key);

      card.innerHTML = `
        <span class="cat-icon">${config.icon}</span>
        <span class="cat-name">${cat.name.split('/')[0].trim()}</span>
        <span class="cat-count">${drugCount} drugs</span>
      `;

      catGrid.appendChild(card);
    });
  }

  function renderDrugs(categories, drugs, filter) {
    drugList.innerHTML = '';
    let totalVisible = 0;

    categories.forEach(cat => {
      const catDrugs = cat.drugs || [];
      const filtered = filter
        ? catDrugs.filter(d => d.toLowerCase().includes(filter.toLowerCase()))
        : catDrugs;

      if (filtered.length === 0) return;
      totalVisible += filtered.length;

      const config = catConfig[cat.name] || { icon: '💊', color: '#94a3b8' };

      const section = document.createElement('div');
      section.className = 'drug-section';
      section.id = `cat-${cat.name.replace(/\s+/g,'-')}`;

      const header = document.createElement('div');
      header.className = 'drug-section-header';
      header.style.borderLeftColor = config.color;

      header.innerHTML = `
        <span class="drug-section-icon">${config.icon}</span>
        <span class="drug-section-title">${cat.name}</span>
        <span class="drug-section-count">${filtered.length}</span>
      `;
      section.appendChild(header);

      filtered.forEach(drugName => {
        const drug = drugs[drugName];
        if (!drug) return;

        const item = document.createElement('div');
        item.className = 'drug-item';

        const indication = drug.indications && drug.indications[0]
          ? drug.indications[0].name
          : 'View details';

        item.innerHTML = `
          <span class="drug-badge" style="background:${config.color}"></span>
          <span class="drug-name">${drugName}</span>
          <span class="drug-arrow">→</span>
        `;

        item.onclick = () => {
          window.location.href = `chapters/m1-38.html`;
        };

        section.appendChild(item);
      });

      drugList.appendChild(section);
    });

    emptyState.style.display = totalVisible === 0 ? 'block' : 'none';
  }

  function renderCategories(categories, drugs, filter) {
    renderDrugs(categories, drugs, filter);
  }

  // Search
  searchInput.addEventListener('input', function() {
    const val = this.value.trim();
    searchClear.classList.toggle('visible', val.length > 0);

    if (val.length === 0) {
      renderCategories(allCategories, allDrugs);
    } else {
      const filteredCats = allCategories.map(cat => ({
        ...cat,
        drugs: (cat.drugs || []).filter(d =>
          d.toLowerCase().includes(val.toLowerCase()) ||
          (allDrugs[d] && allDrugs[d].indications && allDrugs[d].indications.some(ind =>
            ind.name.toLowerCase().includes(val.toLowerCase())
          ))
        )
      })).filter(cat => cat.drugs.length > 0);

      renderCategories(filteredCats, allDrugs, val);
    }
  });

  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    renderCategories(allCategories, allDrugs);
    searchInput.focus();
  });

  loadData();
})();
</script>

</body>
</html>
