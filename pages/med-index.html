<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DCAS · Medication Index</title>
<script>(function(){var t=localStorage.getItem('dcas-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#07111f;--bg2:#0d1f35;--bg3:#0a192e;--sf:rgba(255,255,255,.055);--sf2:rgba(255,255,255,.09);--sf3:rgba(255,255,255,.14);--br:rgba(255,255,255,.10);--br2:rgba(255,255,255,.20);--br3:rgba(255,255,255,.30);--text:#dde6f0;--text2:#8fa8c0;--muted:#4a6070;--accent:#3b82f6;--accent-d:rgba(59,130,246,.15);--accent-g:rgba(59,130,246,.35);--card-hover:#0d1f35;--mono:"DM Mono",monospace;--hdr:60px;--hero-bg:linear-gradient(160deg,rgba(30,58,95,.9),rgba(7,17,31,.98))}
[data-theme="light"]{--bg:#f4f7fb;--bg2:#edf2f8;--bg3:#e8eef6;--sf:rgba(0,0,0,.04);--sf2:rgba(0,0,0,.07);--sf3:rgba(0,0,0,.12);--br:rgba(0,0,0,.10);--br2:rgba(0,0,0,.18);--br3:rgba(0,0,0,.28);--text:#1a2b3c;--text2:#4a6070;--muted:#96aab8;--accent:#2563eb;--accent-d:rgba(37,99,235,.12);--accent-g:rgba(37,99,235,.30);--card-hover:#edf2f8;--hero-bg:linear-gradient(160deg,rgba(219,234,254,.95),rgba(244,247,251,.99))}
[data-theme="sepia"]{--bg:#f6f1e8;--bg2:#ede8de;--bg3:#e7e0d4;--sf:rgba(0,0,0,.04);--sf2:rgba(0,0,0,.07);--sf3:rgba(0,0,0,.12);--br:rgba(0,0,0,.10);--br2:rgba(0,0,0,.18);--br3:rgba(0,0,0,.28);--text:#3b2d1f;--text2:#7a6040;--muted:#b09060;--accent:#b45309;--accent-d:rgba(180,83,9,.12);--accent-g:rgba(180,83,9,.30);--card-hover:#ede8de;--hero-bg:linear-gradient(160deg,rgba(251,243,230,.95),rgba(246,241,232,.99))}
[data-theme="amoled"]{--bg:#000;--bg2:#060606;--bg3:#040404;--sf:rgba(255,255,255,.05);--sf2:rgba(255,255,255,.09);--sf3:rgba(255,255,255,.14);--br:rgba(255,255,255,.09);--br2:rgba(255,255,255,.18);--br3:rgba(255,255,255,.28);--text:#eef4fa;--text2:#607888;--muted:#3a5060;--accent:#60a5fa;--accent-d:rgba(96,165,250,.14);--accent-g:rgba(96,165,250,.30);--card-hover:#090909;--hero-bg:linear-gradient(160deg,rgba(6,18,36,.98),rgba(0,0,0,.99))}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;scroll-behavior:smooth}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);min-height:100%;display:flex;flex-direction:column;overflow-x:hidden;transition:background .3s,color .3s}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(37,99,235,.08),transparent),radial-gradient(ellipse 60% 60% at 90% 90%,rgba(16,185,129,.05),transparent),radial-gradient(ellipse 50% 40% at 50% 50%,rgba(139,92,246,.03),transparent);pointer-events:none;z-index:-1}
[data-theme="light"] body::before,[data-theme="sepia"] body::before{opacity:.4}

/* HEADER */
.app-header{height:var(--hdr);background:rgba(7,17,31,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;flex-shrink:0;transition:background .3s,border-color .3s}
[data-theme="light"] .app-header{background:rgba(244,247,251,.94)}
[data-theme="sepia"]  .app-header{background:rgba(246,241,232,.94)}
[data-theme="amoled"] .app-header{background:rgba(0,0,0,.97)}
.hdr-back{width:38px;height:38px;border-radius:12px;background:var(--sf2);border:1px solid var(--br);color:var(--text);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:1rem;flex-shrink:0;transition:background .15s,transform .1s;cursor:pointer}
.hdr-back:hover{background:var(--sf3)}
.hdr-back:active{transform:scale(.9)}
.hdr-badge{width:38px;height:38px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#1e40af,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 4px 16px rgba(59,130,246,.4)}
.hdr-info{flex:1;min-width:0}
.hdr-title{font-size:.95rem;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.hdr-sub{font-size:.62rem;color:var(--text2);margin-top:1px}
.hdr-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.hdr-pill{height:34px;padding:0 14px;border-radius:10px;background:var(--accent-d);border:1px solid var(--accent-g);color:var(--accent);font-size:.75rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;display:flex;align-items:center;gap:6px;transition:background .15s,transform .1s}
.hdr-pill:hover{background:rgba(59,130,246,.22)}
.hdr-pill:active{transform:scale(.95)}
.theme-btn{width:38px;height:38px;border-radius:12px;background:var(--sf2);border:1px solid var(--br);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;flex-shrink:0}
.theme-btn:hover{background:var(--sf3);transform:rotate(18deg) scale(1.06)}
.theme-btn:active{transform:scale(.9)}

/* THEME PANEL */
.overlay{position:fixed;inset:0;z-index:150;display:none}
.overlay.on{display:block}
.theme-panel{position:fixed;top:calc(var(--hdr) + 8px);right:14px;background:var(--bg2);border:1px solid var(--br2);border-radius:20px;padding:18px;z-index:200;box-shadow:0 20px 60px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.3);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);opacity:0;transform:translateY(-12px) scale(.95);pointer-events:none;transition:opacity .22s cubic-bezier(.25,1,.5,1),transform .22s cubic-bezier(.25,1,.5,1);min-width:230px}
.theme-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
.tp-title{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--text2);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--br)}
.tp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tp-option{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:all .18s}
.tp-option:hover{background:var(--sf2)}
.tp-option.active{border-color:var(--accent);background:var(--accent-d)}
.tp-option:active{transform:scale(.96)}
.tp-swatch{width:26px;height:26px;border-radius:8px;flex-shrink:0;border:1px solid var(--br2)}
.tp-swatch-dark{background:linear-gradient(135deg,#07111f,#1e3a5f)}
.tp-swatch-light{background:linear-gradient(135deg,#f4f7fb,#dbe9fc)}
.tp-swatch-sepia{background:linear-gradient(135deg,#f6f1e8,#d4a76a)}
.tp-swatch-amoled{background:linear-gradient(135deg,#000,#0a0a0a);border-color:#333}
.tp-label{font-size:.8rem;font-weight:700;color:var(--text)}
.tp-desc{font-size:.62rem;color:var(--text2);margin-top:1px}
.tp-check{margin-left:auto;font-size:.9rem;opacity:0;transition:opacity .15s}
.tp-option.active .tp-check{opacity:1}

/* HERO */
.hero{background:var(--hero-bg);border-bottom:1px solid var(--br);padding:22px 18px 20px;display:flex;flex-direction:column;gap:16px;flex-shrink:0;transition:background .3s}
.hero-eyebrow{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:5px}
.hero-heading{font-size:1.4rem;font-weight:900;letter-spacing:-.5px;line-height:1.2;color:var(--text)}
.hero-heading .hl{background:linear-gradient(90deg,var(--accent),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:.78rem;color:var(--text2);margin-top:6px;line-height:1.5}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.h-stat{background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:10px 12px;text-align:center;transition:all .2s;cursor:default}
.h-stat:hover{background:var(--sf2);border-color:var(--br2)}
.hs-num{font-size:1.3rem;font-weight:900;font-family:var(--mono);color:var(--text);line-height:1}
.hs-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.7px;color:var(--text2);margin-top:4px;font-weight:700}

/* SEARCH */
.search-wrap{padding:12px 16px;border-bottom:1px solid var(--br);background:rgba(7,17,31,.7);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:sticky;top:var(--hdr);z-index:90;flex-shrink:0;transition:background .3s}
[data-theme="light"] .search-wrap{background:rgba(244,247,251,.9)}
[data-theme="sepia"]  .search-wrap{background:rgba(246,241,232,.9)}
[data-theme="amoled"] .search-wrap{background:rgba(0,0,0,.92)}
.search-inner{display:flex;align-items:center;gap:10px;background:var(--sf2);border:1.5px solid var(--br);border-radius:14px;padding:11px 14px;transition:border-color .2s,box-shadow .2s}
.search-inner:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-d),0 4px 16px rgba(59,130,246,.1)}
.si-icon{font-size:.95rem;color:var(--text2);flex-shrink:0}
.si-input{flex:1;background:transparent;border:none;outline:none;font-size:.93rem;font-family:inherit;color:var(--text)}
.si-input::placeholder{color:var(--muted)}
.si-clear{background:var(--sf2);border:1px solid var(--br);color:var(--text2);cursor:pointer;font-size:.7rem;padding:4px 10px;border-radius:8px;display:none;font-family:inherit;font-weight:700;transition:all .15s}
.si-clear.visible{display:block}
.si-clear:hover{background:var(--sf3);color:var(--text)}

/* FILTER PILLS */
.filter-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:12px 16px;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--bg);transition:background .3s}
.filter-bar::-webkit-scrollbar{display:none}
.fpill{flex-shrink:0;padding:7px 16px;border-radius:24px;font-size:.73rem;font-weight:700;letter-spacing:.3px;border:1.5px solid;cursor:pointer;transition:all .2s cubic-bezier(.25,1,.5,1);white-space:nowrap;font-family:inherit;background:transparent}
.fpill:active{transform:scale(.94)}
.fpill-all{border-color:rgba(59,130,246,.35);color:var(--accent)}
.fpill-all.active{background:var(--accent-d);border-color:var(--accent)}

/* INFO BAR */
.info-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--br);flex-shrink:0;gap:10px;background:var(--bg);transition:background .3s}
.stats-count{font-size:.75rem;color:var(--text2);font-family:var(--mono)}
.stats-count strong{color:var(--text);font-weight:800}
.info-bar-right{display:flex;gap:7px}
.bar-btn{height:30px;padding:0 12px;border-radius:8px;background:var(--sf);border:1px solid var(--br);color:var(--text2);font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.bar-btn:hover{background:var(--sf2);color:var(--text)}
.bar-btn.active{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}

/* A-Z PANEL */
.az-panel{display:none;padding:12px 16px;border-bottom:1px solid var(--br);flex-shrink:0;background:var(--bg2);transition:background .3s}
.az-panel.open{display:block}
.az-grid{display:flex;flex-wrap:wrap;gap:5px}
.az-ltr{width:30px;height:30px;border-radius:8px;border:1px solid var(--br);background:var(--sf2);color:var(--text);font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .15s}
.az-ltr:hover{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}
.az-ltr.off{opacity:.2;pointer-events:none}

/* PAGE BODY */
.page-body{flex:1;padding:18px 16px 100px;max-width:960px;width:100%;margin:0 auto}

/* CATEGORY SECTION */
.cat-section{margin-bottom:26px;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.cat-section:nth-child(1){animation-delay:.04s}
.cat-section:nth-child(2){animation-delay:.08s}
.cat-section:nth-child(3){animation-delay:.12s}
.cat-section:nth-child(4){animation-delay:.16s}
.cat-section:nth-child(5){animation-delay:.20s}
.cat-section:nth-child(6){animation-delay:.24s}
.cat-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:16px 16px 0 0;border:1px solid var(--br);border-bottom:none;background:var(--sf)}
.ch-badge{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.ch-name{font-size:.82rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px}
.ch-count{margin-left:auto;font-size:.65rem;font-family:var(--mono);color:var(--text2);background:var(--sf);border:1px solid var(--br);padding:3px 10px;border-radius:20px}

/* DRUG GRID */
.drug-grid{display:grid;gap:1px;grid-template-columns:1fr;border:1px solid var(--br);border-radius:0 0 16px 16px;overflow:hidden;background:var(--br)}
@media(min-width:580px){.drug-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:860px){.drug-grid{grid-template-columns:repeat(3,1fr)}}

/* DRUG CARD */
.drug-card{background:var(--bg);border:none;text-decoration:none;color:inherit;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:background .18s;cursor:pointer}
.drug-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dc,#3b82f6);opacity:0;transition:opacity .18s}
.drug-card:hover{background:var(--card-hover)}
.drug-card:hover::before{opacity:1}
.drug-card:active{transform:scale(.99)}
.drug-card::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,var(--dc-glow,rgba(59,130,246,.06)),transparent 65%);opacity:0;transition:opacity .25s;pointer-events:none}
.drug-card:hover::after{opacity:1}
.dc-inner{padding:14px 16px;display:flex;align-items:flex-start;gap:12px;flex:1}
.dc-icon-wrap{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.05rem;border:1px solid;transition:transform .18s}
.drug-card:hover .dc-icon-wrap{transform:scale(1.08) rotate(-4deg)}
.dc-content{flex:1;min-width:0}
.dc-name{font-size:.88rem;font-weight:800;letter-spacing:-.25px;line-height:1.3;word-break:break-word;margin-bottom:3px}
.dc-cat-tag{display:inline-block;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;border:1px solid;margin-bottom:8px;opacity:.85}
.dc-inds{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.dc-ind{font-size:.71rem;color:var(--text2);display:flex;align-items:flex-start;gap:7px;line-height:1.35}
.dc-ind-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dc-ind-text{flex:1}
.dc-dose-box{background:var(--sf);border:1px solid var(--br);border-radius:9px;padding:7px 10px;transition:border-color .15s}
.drug-card:hover .dc-dose-box{border-color:var(--br2)}
.dc-dose-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:.6px;font-weight:800;color:var(--text2);margin-bottom:3px}
.dc-dose-val{font-size:.7rem;font-family:var(--mono);color:var(--text);line-height:1.5;word-break:break-word}
.dc-arrow{width:28px;height:28px;border-radius:8px;flex-shrink:0;margin-top:2px;background:var(--sf2);border:1px solid var(--br);display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--text2);transition:all .18s}
.drug-card:hover .dc-arrow{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}

/* ANCHOR */
.az-anchor{display:block;height:0;visibility:hidden;position:relative;top:-80px}

/* EMPTY */
.empty-state{text-align:center;padding:64px 24px;color:var(--text2);animation:fadeUp .3s ease both}
.es-icon{font-size:3rem;display:block;margin-bottom:16px;opacity:.3}
.es-title{font-size:1.05rem;font-weight:800;margin-bottom:6px;color:var(--text)}
.es-sub{font-size:.82rem}

/* BACK TO TOP */
.back-top{position:fixed;bottom:24px;right:18px;width:44px;height:44px;border-radius:14px;background:var(--accent);border:1px solid var(--accent-g);color:#fff;font-size:1rem;font-weight:800;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:80;box-shadow:0 6px 20px rgba(59,130,246,.45),0 2px 8px rgba(0,0,0,.3);transition:transform .15s,opacity .2s;backdrop-filter:blur(8px);font-family:inherit}
.back-top.show{display:flex;animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(.6) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.back-top:hover{transform:translateY(-2px) scale(1.05)}
.back-top:active{transform:scale(.93)}
</style>
</head>
<body>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeThemePanel()"></div>

<!-- HEADER -->
<div class="app-header">
  <button class="hdr-back" onclick="history.length>1?history.back():location.href='../index.html'"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-left'/></svg></button>
  <div class="hdr-badge"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#pill'/></svg></div>
  <div class="hdr-info">
    <div class="hdr-title">Medication Index</div>
    <div class="hdr-sub" id="hdrSub">Loading…</div>
  </div>
  <div class="hdr-actions">
    <a href="drug-calculator.html" class="hdr-pill"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#scale'/></svg>️ Calculator</a>
    <button class="theme-btn" id="themeBtn" onclick="toggleThemePanel()" title="Change theme"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#palette'/></svg></button>
  </div>
</div>

<!-- THEME PANEL -->
<div class="theme-panel" id="themePanel">
  <div class="tp-title">Choose Theme</div>
  <div class="tp-grid">
    <div class="tp-option" data-theme="dark"   onclick="setTheme('dark')">
      <div class="tp-swatch tp-swatch-dark"></div>
      <div><div class="tp-label">Dark</div><div class="tp-desc">Deep navy</div></div>
      <span class="tp-check"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#check'/></svg></span>
    </div>
    <div class="tp-option" data-theme="light"  onclick="setTheme('light')">
      <div class="tp-swatch tp-swatch-light"></div>
      <div><div class="tp-label">Light</div><div class="tp-desc">Clean white</div></div>
      <span class="tp-check"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#check'/></svg></span>
    </div>
    <div class="tp-option" data-theme="sepia"  onclick="setTheme('sepia')">
      <div class="tp-swatch tp-swatch-sepia"></div>
      <div><div class="tp-label">Sepia</div><div class="tp-desc">Warm paper</div></div>
      <span class="tp-check"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#check'/></svg></span>
    </div>
    <div class="tp-option" data-theme="amoled" onclick="setTheme('amoled')">
      <div class="tp-swatch tp-swatch-amoled"></div>
      <div><div class="tp-label">AMOLED</div><div class="tp-desc">Pure black</div></div>
      <span class="tp-check"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#check'/></svg></span>
    </div>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <div class="hero-eyebrow">DCAS CPG 2026 · Formulary</div>
    <div class="hero-heading">EMS <span class="hl">Drug Reference</span></div>
    <div class="hero-desc">Tap any medication to open full dosing in the calculator</div>
  </div>
  <div class="hero-stats">
    <div class="h-stat"><div class="hs-num" id="hsTotalDrugs">—</div><div class="hs-lbl">Medications</div></div>
    <div class="h-stat"><div class="hs-num" id="hsTotalCats">—</div><div class="hs-lbl">Categories</div></div>
    <div class="h-stat"><div class="hs-num" id="hsTotalInds">—</div><div class="hs-lbl">Indications</div></div>
  </div>
</div>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-inner">
    <span class="si-icon"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#search'/></svg></span>
    <input class="si-input" id="searchInput" type="search"
      placeholder="Search by drug name, indication, or class…"
      autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="si-clear" id="clearBtn" onclick="clearSearch()">Clear <svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#x'/></svg></button>
  </div>
</div>

<!-- FILTER PILLS -->
<div class="filter-bar" id="filterBar">
  <button class="fpill fpill-all active" onclick="filterCat('ALL',this)"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#folder-archive'/></svg> All Drugs</button>
</div>

<!-- INFO BAR -->
<div class="info-bar">
  <div class="stats-count" id="statsCount"></div>
  <div class="info-bar-right">
    <button class="bar-btn" id="sortBtn" onclick="toggleSort()"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#move-vertical'/></svg> A–Z</button>
    <button class="bar-btn" id="azBtn"   onclick="toggleAZ()"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#keyboard'/></svg> Jump</button>
  </div>
</div>

<!-- A-Z PANEL -->
<div class="az-panel" id="azPanel">
  <div class="az-grid" id="azGrid"></div>
</div>

<!-- CONTENT -->
<div class="page-body">
  <div id="drugList"></div>
</div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-up'/></svg></button>

<script>
let DRUGS={},CATS=[],activeCat='ALL',query='',sortAZ=false,azOpen=false;

/* THEME */
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('dcas-theme',t);
  document.querySelectorAll('.tp-option').forEach(o=>o.classList.toggle('active',o.dataset.theme===t));
  closeThemePanel();
}
function toggleThemePanel(){
  const p=document.getElementById('themePanel');
  const open=p.classList.toggle('open');
  document.getElementById('overlay').classList.toggle('on',open);
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  document.querySelectorAll('.tp-option').forEach(o=>o.classList.toggle('active',o.dataset.theme===cur));
}
function closeThemePanel(){
  document.getElementById('themePanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeThemePanel();});

/* INIT */
async function init(){
  try{
    const data=await (await fetch('drug-data.json'))).json();
    CATS=data.categories; DRUGS=data.drugs;
    const totalInds=Object.values(DRUGS).reduce((s,d)=>s+(d.indications||[]).length,0);
    document.getElementById('hsTotalDrugs').textContent=Object.keys(DRUGS).length;
    document.getElementById('hsTotalCats').textContent=CATS.length;
    document.getElementById('hsTotalInds').textContent=totalInds;
    document.getElementById('hdrSub').textContent=Object.keys(DRUGS).length+' medications · DCAS CPG 2026';
    buildPills(); buildAZ(); render();
    // deep-link
    const d=new URLSearchParams(location.search).get('drug');
    if(d){document.getElementById('searchInput').value=d;query=d.toLowerCase();document.getElementById('clearBtn').classList.add('visible');render();}
  }catch(err){
    document.getElementById('drugList').innerHTML='<div class="empty-state"><span class="es-icon"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#triangle-alert'/></svg>️</span><div class="es-title">Failed to load</div><div class="es-sub">'+err.message+'</div></div>';
  }
}

/* PILLS */
function buildPills(){
  const bar=document.getElementById('filterBar');
  CATS.forEach(cat=>{
    const b=document.createElement('button');
    b.className='fpill';
    b.style.cssText='border-color:'+cat.color+'40;color:'+cat.color;
    b.textContent=cat.icon+' '+cat.name;
    b.onclick=()=>filterCat(cat.name,b);
    bar.appendChild(b);
  });
}

/* A-Z */
function buildAZ(){
  const active=new Set(Object.keys(DRUGS).map(n=>n[0].toUpperCase()));
  const grid=document.getElementById('azGrid');
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l=>{
    const a=document.createElement('a');
    a.className='az-ltr'+(active.has(l)?'':' off');
    a.textContent=l;
    if(active.has(l))a.href='#az-'+l;
    grid.appendChild(a);
  });
}
function toggleAZ(){azOpen=!azOpen;document.getElementById('azPanel').classList.toggle('open',azOpen);document.getElementById('azBtn').classList.toggle('active',azOpen);}
function toggleSort(){sortAZ=!sortAZ;document.getElementById('sortBtn').textContent=sortAZ?'<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#move-vertical'/></svg> Cat':'<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#move-vertical'/></svg> A–Z';document.getElementById('sortBtn').classList.toggle('active',sortAZ);render();}

/* SEARCH */
document.getElementById('searchInput').addEventListener('input',function(){
  query=this.value.toLowerCase().trim();
  document.getElementById('clearBtn').classList.toggle('visible',query.length>0);
  if(query){activeCat='ALL';resetPills();}
  render();
});
function clearSearch(){document.getElementById('searchInput').value='';query='';document.getElementById('clearBtn').classList.remove('visible');render();}
function filterCat(cat,btn){
  activeCat=cat;query='';
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.remove('visible');
  resetPills();btn.classList.add('active');
  if(cat!=='ALL'){const c=CATS.find(x=>x.name===cat);if(c)btn.style.background=c.color+'22';}
  render();
}
function resetPills(){document.querySelectorAll('.fpill').forEach(p=>{p.classList.remove('active');p.style.background='';});document.querySelector('.fpill-all').classList.add('active');}

/* RENDER */
function render(){
  const list=document.getElementById('drugList');list.innerHTML='';
  let entries=Object.entries(DRUGS);
  if(activeCat!=='ALL')entries=entries.filter(([_,d])=>d.category===activeCat);
  if(query)entries=entries.filter(([name,d])=>{
    const inds=(d.indications||[]).map(i=>i.name.toLowerCase()+' '+(i.dose_formula||'').toLowerCase()).join(' ');
    return name.toLowerCase().includes(query)||d.category.toLowerCase().includes(query)||inds.includes(query);
  });
  const total=entries.length;
  document.getElementById('statsCount').innerHTML='<strong>'+total+'</strong> of <strong>'+Object.keys(DRUGS).length+'</strong> medications';
  if(total===0){list.innerHTML='<div class="empty-state"><span class="es-icon"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#search'/></svg></span><div class="es-title">No results for &ldquo;'+query+'&rdquo;</div><div class="es-sub">Try a different name, class, or indication</div></div>';return;}
  if(sortAZ){
    entries.sort((a,b)=>a[0].localeCompare(b[0]));
    list.appendChild(buildSection({name:'All Medications',icon:'<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#pill'/></svg>',color:'#3b82f6'},entries,true));
  }else{
    const grouped={};CATS.forEach(c=>{grouped[c.name]=[];});
    entries.forEach(([n,d])=>{(grouped[d.category]=grouped[d.category]||[]).push([n,d]);});
    CATS.forEach(cat=>{const arr=grouped[cat.name];if(!arr||!arr.length)return;arr.sort((a,b)=>a[0].localeCompare(b[0]));list.appendChild(buildSection(cat,arr,false));});
  }
}

function buildSection(cat,entries,showAlpha){
  const sec=document.createElement('div');sec.className='cat-section';
  const head=document.createElement('div');head.className='cat-head';
  head.style.borderColor=cat.color+'40';
  head.innerHTML='<div class="ch-badge" style="background:'+cat.color+'18;border:1.5px solid '+cat.color+'35">'+cat.icon+'</div>'
    +'<span class="ch-name" style="color:'+cat.color+'">'+cat.name+'</span>'
    +'<span class="ch-count">'+entries.length+' med'+(entries.length!==1?'s':'')+'</span>';
  sec.appendChild(head);
  const grid=document.createElement('div');grid.className='drug-grid';
  let lastL='';
  entries.forEach(([name,drug])=>{
    if(showAlpha){const l=name[0].toUpperCase();if(l!==lastL){const a=document.createElement('span');a.className='az-anchor';a.id='az-'+l;grid.appendChild(a);lastL=l;}}
    grid.appendChild(buildCard(name,drug,cat));
  });
  sec.appendChild(grid);return sec;
}

function buildCard(name,drug,cat){
  const cc=cat.color.startsWith('var')?'#3b82f6':cat.color;
  const card=document.createElement('a');
  card.className='drug-card';
  card.href='drug-calculator.html?drug='+encodeURIComponent(name);
  card.style.setProperty('--dc',cc);
  card.style.setProperty('--dc-glow',cc+'10');
  const allInds=(drug.indications||[]).map(i=>i.name);
  const primaryDose=drug.indications&&drug.indications[0]?drug.indications[0].dose_formula:'';
  card.innerHTML='<div class="dc-inner">'
    +'<div class="dc-icon-wrap" style="background:'+cc+'15;border-color:'+cc+'30;color:'+cc+'">'+cat.icon+'</div>'
    +'<div class="dc-content">'
    +'<div class="dc-name">'+hl(name)+'</div>'
    +'<span class="dc-cat-tag" style="color:'+cc+';border-color:'+cc+'35;background:'+cc+'10">'+cat.name+'</span>'
    +'<div class="dc-inds">'+allInds.map(i=>'<div class="dc-ind"><div class="dc-ind-dot" style="background:'+cc+'"></div><div class="dc-ind-text">'+hl(i)+'</div></div>').join('')+'</div>'
    +(primaryDose?'<div class="dc-dose-box"><div class="dc-dose-lbl">Primary Dose</div><div class="dc-dose-val">'+hl(primaryDose)+'</div></div>':'')
    +'</div>'
    +'<div class="dc-arrow"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-right'/></svg></div>'
    +'</div>';
  return card;
}

function hl(text){
  if(!query)return text;
  return text.replace(new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),
    '<mark style="background:rgba(251,191,36,.28);color:inherit;border-radius:3px;padding:0 2px">$1</mark>');
}

window.addEventListener('scroll',()=>{document.getElementById('backTop').classList.toggle('show',scrollY>320);},{passive:true});

init();
</script>
</body>
</html>
