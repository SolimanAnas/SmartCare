<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DCAS · Medical Assessment</title>
<script>
  (function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07111f;--sf:rgba(255,255,255,.055);--sf2:rgba(255,255,255,.09);
  --br:rgba(255,255,255,.10);--br2:rgba(255,255,255,.18);
  --text:#dde6f0;--muted:#5a7080;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --blue:#3b82f6;--cyan:#06b6d4;--purple:#8b5cf6;--orange:#f97316;
  --mono:"JetBrains Mono",monospace;--hdr:60px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100%;display:flex;flex-direction:column;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(59,130,246,.08),transparent),radial-gradient(ellipse 70% 60% at 90% 100%,rgba(15,39,68,.8),transparent);pointer-events:none;z-index:-1}

/* ── HEADER ──────────────────────────────────────── */
.app-header{height:var(--hdr);background:rgba(7,17,31,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:70;flex-shrink:0}
.hdr-back{width:36px;height:36px;border-radius:11px;background:var(--sf2);border:1px solid var(--br);color:var(--text);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:.85rem;flex-shrink:0;transition:background .15s}
.hdr-back:active{background:var(--br2)}
.hdr-badge{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#1e3a5f,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;box-shadow:0 4px 14px rgba(59,130,246,.4)}
.hdr-info{flex:1}
.hdr-title{font-size:.93rem;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:.62rem;color:var(--muted)}
.hdr-timer{font-family:var(--mono);font-size:.82rem;font-weight:700;color:var(--cyan);flex-shrink:0;letter-spacing:-.5px}

/* ── PROGRESS STRIP ──────────────────────────────── */
.progress-strip{position:sticky;top:var(--hdr);z-index:65;background:rgba(7,17,31,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--br);padding:10px 14px;flex-shrink:0}
.ps-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.ps-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.ps-pct{font-size:.78rem;font-weight:800;font-family:var(--mono);color:var(--cyan)}
.ps-bar{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.ps-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan),var(--green));border-radius:3px;transition:width .5s cubic-bezier(.25,1,.5,1);width:0%}
.phase-pills{display:flex;gap:5px;margin-top:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.phase-pills::-webkit-scrollbar{display:none}
.phase-pill{flex-shrink:0;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:4px 10px;border-radius:20px;border:1px solid;cursor:pointer;transition:all .2s;white-space:nowrap}
.phase-pill.done{opacity:.6}
.phase-pill:active{transform:scale(.96)}

/* ── PAGE BODY ───────────────────────────────────── */
.page-body{flex:1;overflow-y:auto;padding:14px 14px 140px;max-width:680px;width:100%;margin:0 auto;display:flex;flex-direction:column;gap:12px}

/* ── PHASE SECTION HEADER ────────────────────────── */
.phase-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:16px;border-left:4px solid;margin-bottom:8px}
.ph-icon{font-size:1.1rem;flex-shrink:0}
.ph-info{flex:1}
.ph-title{font-size:.9rem;font-weight:800}
.ph-sub{font-size:.64rem;color:var(--muted);margin-top:1px}
.ph-count{font-size:.65rem;font-weight:700;font-family:var(--mono);border-radius:20px;padding:3px 10px;flex-shrink:0;border:1px solid}

/* ── STEP CARD ───────────────────────────────────── */
.step-card{background:var(--sf);border:1px solid var(--br);border-radius:16px;overflow:hidden;transition:border-color .25s,box-shadow .25s;margin-bottom:6px}
.step-card.checked{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.04)}
.step-card.critical.checked{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.05)}
.step-card.warn-item.checked{border-color:rgba(234,179,8,.4);background:rgba(234,179,8,.04)}

.step-row{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;cursor:pointer;-webkit-user-select:none;user-select:none}
.step-row:active{background:rgba(255,255,255,.04)}

.step-check{width:24px;height:24px;border-radius:7px;border:2px solid rgba(255,255,255,.18);background:rgba(0,0,0,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.step-check.c-done{background:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(34,197,94,.4)}
.step-check.c-crit{background:var(--red);border-color:var(--red);box-shadow:0 0 10px rgba(239,68,68,.4)}
.step-check.c-warn{background:var(--yellow);border-color:var(--yellow);box-shadow:0 0 10px rgba(234,179,8,.35)}
.step-check::after{content:'';display:none}
.step-check.c-done::after,.step-check.c-crit::after,.step-check.c-warn::after{content:"";display:inline-block;width:1em;height:1em;vertical-align:-.125em;background-color:currentColor;-webkit-mask:url("data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%20fill='black'%20stroke='black'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M20%206%209%2017l-5-5'%20/%3E%3C/svg%3E") no-repeat center/contain;mask:url("data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2024%2024'%20fill='black'%20stroke='black'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%3E%3Cpath%20d='M20%206%209%2017l-5-5'%20/%3E%3C/svg%3E") no-repeat center/contain;display:block;;font-size:.72rem;color:#fff;font-weight:900}

.step-body{flex:1;min-width:0}
.step-title{font-size:.85rem;font-weight:700;color:var(--text);line-height:1.3;transition:color .2s}
.step-card.checked .step-title{color:rgba(221,230,240,.6)}
.step-desc{font-size:.7rem;color:var(--muted);margin-top:3px;line-height:1.45}
.step-badge{display:inline-flex;align-items:center;gap:3px;font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.7px;border-radius:6px;padding:2px 7px;border:1px solid;margin-top:5px}

.badge-critical{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5}
.badge-intervene{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:#fca5a5}
.badge-warn{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.28);color:#fde047}

.step-note-row{padding:0 14px 12px 50px}
.step-note{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--br);border-radius:10px;padding:8px 12px;font-size:.76rem;font-family:inherit;color:var(--text);resize:none;outline:none;min-height:44px;transition:border-color .2s;display:none}
.step-note.open{display:block;animation:noteIn .18s ease}
@keyframes noteIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.step-note:focus{border-color:rgba(59,130,246,.45)}
.step-note::placeholder{color:var(--muted)}

/* ── SUB-SECTION DIVIDER ─────────────────────────── */
.sub-sec{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:1.1px;padding:10px 14px 6px;color:var(--muted);display:flex;align-items:center;gap:6px}
.sub-sec::after{content:'';flex:1;height:1px;background:var(--br)}

/* ── VITAL SIGNS GRID ────────────────────────────── */
.vitals-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 14px 14px}
.vital-box{background:rgba(0,0,0,.2);border:1px solid var(--br);border-radius:12px;padding:10px 12px}
.vital-label{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);margin-bottom:6px}
.vital-input{width:100%;background:transparent;border:none;outline:none;font-size:1rem;font-weight:700;font-family:var(--mono);color:var(--cyan);padding:0}
.vital-input::placeholder{color:rgba(90,112,128,.5);font-weight:400;font-size:.85rem}
.vital-unit{font-size:.62rem;color:var(--muted);margin-top:2px}

/* ── AVPU row ────────────────────────────────────── */
.avpu-row{display:flex;gap:6px;padding:0 14px 14px}
.avpu-btn{flex:1;padding:9px 4px;border-radius:10px;font-size:.8rem;font-weight:700;font-family:inherit;cursor:pointer;border:1.5px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:var(--muted);transition:all .18s;text-align:center}
.avpu-btn:active{transform:scale(.95)}
.avpu-btn.sel-A{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.5);color:#86efac}
.avpu-btn.sel-V{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.4);color:#fde047}
.avpu-btn.sel-P{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.4);color:#fdba74}
.avpu-btn.sel-U{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.45);color:#fca5a5}

/* Priority row */
.priority-row{display:flex;gap:6px;padding:0 14px 14px}
.pri-btn{flex:1;padding:9px 4px;border-radius:10px;font-size:.72rem;font-weight:700;font-family:inherit;cursor:pointer;border:1.5px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:var(--muted);transition:all .18s;text-align:center}
.pri-btn:active{transform:scale(.95)}
.pri-btn.sel-high{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.5);color:#fca5a5}
.pri-btn.sel-med{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.4);color:#fde047}
.pri-btn.sel-low{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#86efac}

/* OPQRST boxes */
.opqrst-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:8px 14px 14px}
.opqrst-grid .opqrst-box:last-child{grid-column:1/-1}
.opqrst-box{background:rgba(0,0,0,.2);border:1px solid var(--br);border-radius:11px;padding:9px 12px}
.opqrst-key{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--cyan);margin-bottom:4px}
.opqrst-word{font-size:.65rem;color:var(--muted);margin-bottom:6px}
.opqrst-input{width:100%;background:transparent;border:none;outline:none;font-size:.78rem;font-family:inherit;color:var(--text);resize:none;min-height:36px}
.opqrst-input::placeholder{color:rgba(90,112,128,.5);font-size:.72rem}

/* AMPLE boxes */
.ample-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:8px 14px 14px}
.ample-box{background:rgba(0,0,0,.2);border:1px solid var(--br);border-radius:11px;padding:9px 12px}
.ample-key{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--cyan);margin-bottom:4px}
.ample-word{font-size:.65rem;color:var(--muted);margin-bottom:6px}
.ample-input{width:100%;background:transparent;border:none;outline:none;font-size:.78rem;font-family:inherit;color:var(--text);resize:none;min-height:36px}
.ample-input::placeholder{color:rgba(90,112,128,.5);font-size:.72rem}

/* Physical exam toggle */
.phys-toggle{display:flex;gap:8px;padding:0 14px 14px}
.phys-btn{flex:1;padding:11px 8px;border-radius:12px;font-size:.79rem;font-weight:700;font-family:inherit;cursor:pointer;border:1.5px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:var(--muted);transition:all .18s;text-align:center;line-height:1.3}
.phys-btn:active{transform:scale(.97)}
.phys-btn.sel{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.5);color:#93c5fd}

/* ── RESULTS SECTION ─────────────────────────────── */
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px 14px 14px}
.result-btn{padding:12px 8px;border-radius:12px;font-size:.82rem;font-weight:700;font-family:inherit;cursor:pointer;border:1.5px solid rgba(255,255,255,.1);background:rgba(0,0,0,.2);color:var(--muted);transition:all .18s;text-align:center}
.result-btn:active{transform:scale(.96)}
.result-btn.sel-excellent{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.5);color:#86efac}
.result-btn.sel-good{background:rgba(6,182,212,.12);border-color:rgba(6,182,212,.45);color:#67e8f9}
.result-btn.sel-adequate{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.4);color:#fde047}
.result-btn.sel-inadequate{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.45);color:#fca5a5}

/* ── COMPLETE FAB ────────────────────────────────── */
.fab-complete{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:80;background:linear-gradient(135deg,#1e3a5f,#3b82f6);color:#fff;border:none;border-radius:30px;padding:15px 36px;font-size:.92rem;font-weight:800;font-family:inherit;cursor:pointer;box-shadow:0 8px 28px rgba(59,130,246,.45);transition:all .18s;white-space:nowrap;display:flex;align-items:center;gap:10px}
.fab-complete:active{transform:translateX(-50%) scale(.97)}
.fab-complete.ready{background:linear-gradient(135deg,#14532d,#16a34a);box-shadow:0 8px 28px rgba(22,163,74,.45)}

/* ── BOTTOM SHEET ────────────────────────────────── */
.bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);z-index:200;display:none;flex-direction:column;justify-content:flex-end}
.bs-overlay.open{display:flex;animation:bsFI .22s ease}
@keyframes bsFI{from{opacity:0}to{opacity:1}}
.bs-panel{background:#0a1728;border-top:1px solid rgba(255,255,255,.12);border-radius:24px 24px 0 0;display:flex;flex-direction:column;max-height:90vh;padding-bottom:max(20px,env(safe-area-inset-bottom));animation:bsSU .34s cubic-bezier(.25,1,.5,1)}
@keyframes bsSU{from{transform:translateY(70px);opacity:0}to{transform:translateY(0);opacity:1}}
.bs-handle-wrap{padding:10px 0 4px;cursor:pointer;display:flex;justify-content:center;flex-shrink:0}
.bs-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.18)}
.bs-head{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 12px;border-bottom:1px solid var(--br);flex-shrink:0}
.bs-htitle{font-size:.95rem;font-weight:800}
.bs-hclose{width:30px;height:30px;border-radius:8px;background:var(--sf2);border:1px solid var(--br);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:background .15s}
.bs-hclose:active{background:var(--br2)}
.bs-scroll{overflow-y:auto;flex:1;padding:16px}
.bs-scroll::-webkit-scrollbar{width:3px}
.bs-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

.sum-stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sum-stat{background:var(--sf);border:1px solid var(--br);border-radius:13px;padding:12px 10px;text-align:center}
.sum-stat-val{font-size:1.3rem;font-weight:900;font-family:var(--mono);color:var(--cyan)}
.sum-stat-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:3px}
.sum-phase{background:var(--sf);border:1px solid var(--br);border-radius:13px;padding:12px 14px;margin-bottom:8px}
.sum-phase-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sum-phase-name{font-size:.8rem;font-weight:700}
.sum-phase-pct{font-size:.72rem;font-weight:700;font-family:var(--mono)}
.sum-phase-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.sum-phase-fill{height:100%;border-radius:2px;transition:width .4s}
.sum-miss-list{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.sum-miss-item{font-size:.72rem;color:#fca5a5;display:flex;align-items:flex-start;gap:6px}
.sum-miss-dot{width:4px;height:4px;border-radius:50%;background:#fca5a5;flex-shrink:0;margin-top:5px}
.sum-result-box{border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;border:1.5px solid}
.sum-result-icon{font-size:1.8rem;flex-shrink:0}
.sum-result-title{font-size:.95rem;font-weight:800}
.sum-result-sub{font-size:.72rem;margin-top:2px}
.print-btn{width:100%;padding:13px;border-radius:14px;background:var(--sf);border:1px solid var(--br);color:var(--text);font-size:.85rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:6px}
.print-btn:active{background:var(--sf2)}
.reset-btn{width:100%;padding:13px;border-radius:14px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;font-size:.85rem;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;margin-top:6px}
.reset-btn:active{background:rgba(239,68,68,.2)}
</style>
</head>
<body>

<header class="app-header">
  <a class="hdr-back" href="ems-tools.html"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-left'/></svg></a>
  <div class="hdr-badge"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#stethoscope'/></svg></div>
  <div class="hdr-info">
    <div class="hdr-title">Medical Assessment</div>
    <div class="hdr-sub">DCAS CPG 2026 · Systematic Evaluation</div>
  </div>
  <div class="hdr-timer" id="hdrTimer">00:00</div>
</header>

<div class="progress-strip">
  <div class="ps-top">
    <span class="ps-label">Overall Progress</span>
    <span class="ps-pct" id="overallPct">0%</span>
  </div>
  <div class="ps-bar"><div class="ps-bar-fill" id="overallBar"></div></div>
  <div class="phase-pills" id="phasePills"></div>
</div>

<main class="page-body" id="pageBody"></main>

<button class="fab-complete" id="fabBtn" onclick="openSummary()">
  <span id="fabIcon"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#clipboard-list'/></svg></span>
  <span id="fabText">View Summary</span>
</button>

<div class="bs-overlay" id="bsOverlay" onclick="if(event.target===this)closeSheet()">
  <div class="bs-panel">
    <div class="bs-handle-wrap" onclick="closeSheet()"><div class="bs-handle"></div></div>
    <div class="bs-head">
      <div class="bs-htitle">Assessment Summary</div>
      <div class="bs-hclose" onclick="closeSheet()"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#x'/></svg></div>
    </div>
    <div class="bs-scroll" id="bsContent"></div>
  </div>
</div>

<script>
'use strict';

const SCHEMA = [

  /* ── PHASE 1: SCENE SIZE-UP ─────────────────────── */
  {
    id:'scene', label:'Scene Size-Up', icon:'<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#hospital'/></svg>',
    color:'#22c55e', pill:'pill-scene',
    desc:'First actions on scene before patient contact',
    items:[
      { id:'ppe',       type:'check', title:'PPE', desc:'Don appropriate personal protective equipment', badge:'critical' },
      { id:'safety',    type:'check', title:'Scene Safety', desc:'Ensure scene is safe for crew and patient' },
      { id:'noi',       type:'check', title:'Nature of Illness', desc:'Identify the chief complaint or nature of illness' },
      { id:'numpt',     type:'check', title:'Number of Patients', desc:'Confirm how many patients require assessment' },
      { id:'addres',    type:'check', title:'Additional Resources', desc:'Request ALS, fire, police, or additional units if needed' },
    ]
  },

  /* ── PHASE 2: PRIMARY ASSESSMENT ────────────────── */
  {
    id:'primary', label:'Primary Assessment', icon:'<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#eye'/></svg>️',
    color:'#3b82f6', pill:'pill-primary',
    desc:'Rapid life-threat identification and intervention',
    items:[
      /* General Impression */
      { id:'impression_sub', type:'subsection', label:'General Impression' },

/* ── Build page ─────────────────────────────────────── */
function buildPage() {
  const body   = document.getElementById('pageBody');
  const pills  = document.getElementById('phasePills');
  body.innerHTML = '';
  pills.innerHTML = '';

  SCHEMA.forEach(phase => {
    const pill = document.createElement('button');
    pill.className = 'phase-pill';
    pill.id = 'pill-' + phase.id;
    pill.style.color = phase.color;
    pill.style.borderColor = phase.color + '60';
    pill.style.background  = phase.color + '18';
    pill.textContent = phase.icon + ' ' + phase.label;
    pill.onclick = () => document.getElementById('phase-' + phase.id)
        ?.scrollIntoView({ behavior:'smooth', block:'start' });
    pills.appendChild(pill);

    const sec = document.createElement('div');
    sec.id = 'phase-' + phase.id;

    sec.innerHTML = `<div class="phase-hdr" style="background:${phase.color}12;border-color:${phase.color}">
      <div class="ph-icon">${phase.icon}</div>
      <div class="ph-info">
        <div class="ph-title" style="color:${phase.color}">${phase.label}</div>
        <div class="ph-sub">${phase.desc}</div>
      </div>
      <div class="ph-count" id="count-${phase.id}" style="color:${phase.color};background:${phase.color}18;border-color:${phase.color}40">0%</div>
    </div>`;

    phase.items.forEach(item => buildItem(sec, item, phase));
    body.appendChild(sec);
  });
}

function buildItem(parent, item, phase) {
  if (item.type === 'subsection') {
    const d = document.createElement('div');
    d.className = 'sub-sec';
    d.style.color = phase.color;
    d.innerHTML = `<span>${item.label}</span>`;
    parent.appendChild(d);
    return;
  }

  if (item.type === 'vitals')    { parent.appendChild(buildVitals()); return; }
  if (item.type === 'opqrst')   { parent.appendChild(buildOPQRST()); return; }
  if (item.type === 'ample')    { parent.appendChild(buildAMPLE()); return; }
  if (item.type === 'avpu')     { parent.appendChild(buildAVPU(item, phase)); return; }
  if (item.type === 'priority') { parent.appendChild(buildPriority(item, phase)); return; }
  if (item.type === 'phys-toggle'){ parent.appendChild(buildPhysToggle(item, phase)); return; }
  if (item.type === 'result')   { parent.appendChild(buildResult()); return; }

  const card = document.createElement('div');
  card.className = 'step-card' + (item.badge === 'critical' || item.badge === 'intervene' ? ' critical' : item.badge === 'warn' ? ' warn-item' : '');
  card.id = 'card-' + item.id;

  const checkCls = item.badge === 'critical' || item.badge === 'intervene' ? 'c-crit' : item.badge === 'warn' ? 'c-warn' : 'c-done';

  const badgeHtml = item.badge ? `<span class="step-badge badge-${item.badge}">${
    item.badge === 'critical' ? '<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#triangle-alert'/></svg> Critical' :
    item.badge === 'intervene' ? '<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#siren'/></svg> Intervene' : '<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#zap'/></svg> Important'
  }</span>` : '';

  card.innerHTML = `<div class="step-row" onclick="toggleStep('${item.id}','${checkCls}')">
      <div class="step-check" id="chk-${item.id}"></div>
      <div class="step-body">
        <div class="step-title">${item.title}</div>
        <div class="step-desc">${item.desc}</div>
        ${badgeHtml}
      </div>
    </div>
    <div class="step-note-row">
      <textarea class="step-note" id="note-${item.id}" placeholder="Add note…" rows="2"
        oninput="state.notes['${item.id}']=this.value"></textarea>
    </div>`;

  const row = card.querySelector('.step-row');
  let pressTimer;
  row.addEventListener('touchstart', () => { pressTimer = setTimeout(() => showNote(item.id), 600); }, { passive:true });
  row.addEventListener('touchend',   () => clearTimeout(pressTimer));
  row.addEventListener('touchmove',  () => clearTimeout(pressTimer), { passive:true });

  parent.appendChild(card);
}

function showNote(id) {
  const note = document.getElementById('note-' + id);
  if (note) { note.classList.add('open'); note.focus(); }
}

/* ═══════════════════════════════════════════════════════
   INTERACTION HANDLERS
═══════════════════════════════════════════════════════ */

function toggleStep(id, checkCls) {
  state.checked[id] = !state.checked[id];
  const chk  = document.getElementById('chk-' + id);
  const card = document.getElementById('card-' + id);
  if (!chk) return;
  chk.className = 'step-check' + (state.checked[id] ? ' ' + checkCls : '');
  if (card) card.classList.toggle('checked', state.checked[id]);
  if (state.checked[id]) {
    const note = document.getElementById('note-' + id);
    if (!note?.classList.contains('open')) {
      chk.style.animation = 'none';
      requestAnimationFrame(() => { chk.style.animation = ''; });
    }
  }
  updateProgress();
}

function pickAVPU(val, cls) {
  document.querySelectorAll('.avpu-btn').forEach(b => b.className = 'avpu-btn');
  document.getElementById('avpu-' + val)?.classList.add(cls);
  state.avpu = val;
  state.checked['avpu_step'] = true;
  updateProgress();
}

function pickPriority(val, cls) {
  document.querySelectorAll('.pri-btn').forEach(b => b.className = 'pri-btn');
  document.getElementById('pri-' + val)?.classList.add(cls);
  state.priority = val;
  state.checked['priority'] = true;
  updateProgress();
}

function pickPhys(val) {
  ['con','aloc'].forEach(v => document.getElementById('phys-' + v)?.classList.remove('sel'));
  document.getElementById('phys-' + val)?.classList.add('sel');
  state.physType = val;
  state.checked['phys_type'] = true;
  updateProgress();
}

function checkVitals() {
  const v = state.vitals;
  state.checked['vitals_inputs'] = !!(v.hr && v.rr && v.bp && v.spo2);
  updateProgress();
}

function checkOPQRST() {
  state.checked['opqrst_inputs'] = Object.values(state.opqrst).some(v => v.trim().length > 0);
  updateProgress();
}

function checkAMPLE() {
  state.checked['ample_inputs'] = Object.values(state.ample).some(v => v.trim().length > 0);
  updateProgress();
}

function pickResult(val, cls) {
  document.querySelectorAll('.result-btn').forEach(b => b.className = 'result-btn');
  document.getElementById('res-' + val)?.classList.add(cls);
  state.result = val;
  state.checked['result_rating'] = true;
  updateProgress();
}

/* ═══════════════════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════════════════ */
function getCheckableItems() {
  const items = [];
  SCHEMA.forEach(phase => {
    phase.items.forEach(item => {
      if (item.type !== 'subsection') items.push({ phaseId: phase.id, item });
    });
  });
  return items;
}

function updateProgress() {
  const all = getCheckableItems();
  const done = all.filter(({item}) => state.checked[item.id]);
  const pct = all.length ? Math.round((done.length / all.length) * 100) : 0;

  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallBar').style.width  = pct + '%';

  SCHEMA.forEach(phase => {
    const pItems = phase.items.filter(i => i.type !== 'subsection');
    const pDone  = pItems.filter(i => state.checked[i.id]).length;
    const pPct   = pItems.length ? Math.round((pDone / pItems.length) * 100) : 0;
    const countEl = document.getElementById('count-' + phase.id);
    const pillEl  = document.getElementById('pill-' + phase.id);
    if (countEl) countEl.textContent = pPct + '%';
    if (pillEl)  pillEl.classList.toggle('done', pPct === 100);
  });

  const fab = document.getElementById('fabBtn');
  const ready = pct >= 80;
  fab.classList.toggle('ready', ready);
  document.getElementById('fabIcon').textContent = ready ? '<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-check-big'/></svg>' : '<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#clipboard-list'/></svg>';
  document.getElementById('fabText').textContent = ready ? 'Complete Assessment' : `Summary (${pct}%)`;
}

/* ═══════════════════════════════════════════════════════
   BOTTOM SHEET
═══════════════════════════════════════════════════════ */
function openSummary() {
  const all    = getCheckableItems();
  const done   = all.filter(({item}) => state.checked[item.id]);
  const missed = all.filter(({item}) => !state.checked[item.id]);
  const pct    = all.length ? Math.round((done.length / all.length) * 100) : 0;
  const elapsed = formatTime(Math.floor((Date.now() - state.startTime) / 1000));

  const resultColors = {
    excellent:{label:'Excellent Performance',icon:'<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#star'/></svg>',sub:'All critical steps completed to high standard'},
    good:     {label:'Good Performance',icon:'<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-check-big'/></svg>',sub:'Assessment completed competently'},
    adequate: {label:'Adequate Performance',icon:'🟡',sub:'Minimum standards met — review missed steps'},
    inadequate:{label:'Inadequate Performance',icon:'<svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-x'/></svg>',sub:'Critical deficiencies identified — remediation required'},
  };
  const res = state.result ? resultColors[state.result] : null;

  let html = '';

  html += `<div class="sum-stat-row">
    <div class="sum-stat"><div class="sum-stat-val">${pct}%</div><div class="sum-stat-lbl">Completion</div></div>
    <div class="sum-stat"><div class="sum-stat-val">${elapsed}</div><div class="sum-stat-lbl">Duration</div></div>
    <div class="sum-stat"><div class="sum-stat-val">${missed.length}</div><div class="sum-stat-lbl">Missed</div></div>
  </div>`;

  // Patient data
  html += `<div class="sum-phase" style="margin-bottom:10px">
    <div class="sum-phase-hdr"><span class="sum-phase-name"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#chart-no-axes-column'/></svg> Patient Data</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.76rem">
      <div><span style="color:var(--muted)">AVPU:</span> <strong>${state.avpu||'—'}</strong></div>
      <div><span style="color:var(--muted)">Priority:</span> <strong>${state.priority||'—'}</strong></div>
      <div><span style="color:var(--muted)">HR:</span> <strong>${state.vitals.hr||'—'}</strong></div>
      <div><span style="color:var(--muted)">RR:</span> <strong>${state.vitals.rr||'—'}</strong></div>
      <div><span style="color:var(--muted)">BP:</span> <strong>${state.vitals.bp||'—'}</strong></div>
      <div><span style="color:var(--muted)">SpO₂:</span> <strong>${state.vitals.spo2||'—'}%</strong></div>
      <div><span style="color:var(--muted)">RBS:</span> <strong>${state.vitals.rbs||'—'}</strong></div>
      <div><span style="color:var(--muted)">ECG:</span> <strong>${state.vitals.ecg||'—'}</strong></div>
    </div>
  </div>`;

  // OPQRST
  const opqVals = Object.entries(state.opqrst).map(([k,v]) => ({k,v,label:{o:'Onset',p:'Provocation',q:'Quality',r:'Radiation',s:'Severity',t:'Time'}[k]})).filter(x=>x.v);
  if (opqVals.length) {
    html += `<div class="sum-phase" style="margin-bottom:10px">
      <div class="sum-phase-hdr"><span class="sum-phase-name"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#zoom-in'/></svg> OPQRST</span></div>
      ${opqVals.map(x=>`<div style="font-size:.76rem;margin-bottom:4px"><strong style="color:var(--cyan)">${x.label}:</strong> ${esc(x.v)}</div>`).join('')}
    </div>`;
  }

  // AMPLE
  const ampVals = Object.entries(state.ample).map(([k,v]) => ({k,v,label:{a:'Allergies',m:'Medications',p:'Past History',l:'Last Intake',e:'Events'}[k]})).filter(x=>x.v);
  if (ampVals.length) {
    html += `<div class="sum-phase" style="margin-bottom:10px">
      <div class="sum-phase-hdr"><span class="sum-phase-name"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#clipboard-list'/></svg> AMPLE</span></div>
      ${ampVals.map(x=>`<div style="font-size:.76rem;margin-bottom:4px"><strong style="color:var(--cyan)">${x.label}:</strong> ${esc(x.v)}</div>`).join('')}
    </div>`;
  }

  // Phase breakdown
  SCHEMA.forEach(phase => {
    const pItems = phase.items.filter(i => i.type !== 'subsection');
    const pDone  = pItems.filter(i => state.checked[i.id]).length;
    const pPct   = pItems.length ? Math.round((pDone / pItems.length) * 100) : 0;
    const pMissed = pItems.filter(i => !state.checked[i.id]);
    html += `<div class="sum-phase">
      <div class="sum-phase-hdr">
        <span class="sum-phase-name">${phase.icon} ${phase.label}</span>
        <span class="sum-phase-pct" style="color:${phase.color}">${pPct}%</span>
      </div>
      <div class="sum-phase-bar"><div class="sum-phase-fill" style="width:${pPct}%;background:${phase.color}"></div></div>
      ${pMissed.length ? `<div class="sum-miss-list">${pMissed.map(i=>`<div class="sum-miss-item"><div class="sum-miss-dot"></div>${i.title}</div>`).join('')}</div>` : ''}
    </div>`;
  });

  // Result
  if (res) {
    html += `<div class="sum-result-box" style="background:rgba(6,182,212,.08);border-color:rgba(6,182,212,.25)">
      <div class="sum-result-icon">${res.icon}</div>
      <div><div class="sum-result-title">${res.label}</div><div class="sum-result-sub" style="color:var(--muted)">${res.sub}</div></div>
    </div>`;
  }

  html += `<button class="print-btn" onclick="window.print()"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#printer'/></svg>️ Print / Save Report</button>`;
  html += `<button class="reset-btn" onclick="if(confirm('Reset entire assessment?')){localStorage.removeItem('dcas-med-assess');location.reload()}"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#trash-2'/></svg>️ Reset Assessment</button>`;

  document.getElementById('bsContent').innerHTML = html;
  document.getElementById('bsOverlay').classList.add('open');
}

function closeSheet() {
  document.getElementById('bsOverlay').classList.remove('open');
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════════════ */
function startTimer() {
  const el = document.getElementById('hdrTimer');
  setInterval(() => {
    const s = Math.floor((Date.now() - state.startTime) / 1000);
    el.textContent = formatTime(s);
  }, 1000);
}

/* ═══════════════════════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════════════════════ */
function saveState() {
  try { localStorage.setItem('dcas-med-assess', JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const raw = localStorage.getItem('dcas-med-assess');
    if (raw) {
      const saved = JSON.parse(raw);
      Object.assign(state, saved);
      state.startTime = saved.startTime || Date.now();
    }
  } catch(e) {}
}

function restoreUI() {
  // Restore checkboxes
  Object.entries(state.checked).forEach(([id, val]) => {
    if (!val) return;
    const chk = document.getElementById('chk-' + id);
    const card = document.getElementById('card-' + id);
    if (chk) {
      const item = findItemById(id);
      const cls = item && (item.badge === 'critical' || item.badge === 'intervene') ? 'c-crit' : item && item.badge === 'warn' ? 'c-warn' : 'c-done';
      chk.className = 'step-check ' + cls;
    }
    if (card) card.classList.add('checked');
  });

  // Restore AVPU
  if (state.avpu) {
    const cls = {A:'sel-A',V:'sel-V',P:'sel-P',U:'sel-U'}[state.avpu];
    document.getElementById('avpu-' + state.avpu)?.classList.add(cls);
  }

  // Restore priority
  if (state.priority) {
    const cls = {high:'sel-high',med:'sel-med',low:'sel-low'}[state.priority];
    document.getElementById('pri-' + state.priority)?.classList.add(cls);
  }

  // Restore vitals
  Object.entries(state.vitals).forEach(([k,v]) => {
    const el = document.getElementById('v-' + k);
    if (el && v) el.value = v;
  });

  // Restore OPQRST
  Object.entries(state.opqrst).forEach(([k,v]) => {
    const el = document.getElementById('opq-' + k);
    if (el && v) el.value = v;
  });

  // Restore AMPLE
  Object.entries(state.ample).forEach(([k,v]) => {
    const el = document.getElementById('amp-' + k);
    if (el && v) el.value = v;
  });

  // Restore phys type
  if (state.physType) {
    document.getElementById('phys-' + state.physType)?.classList.add('sel');
  }

  // Restore result
  if (state.result) {
    const cls = {excellent:'sel-excellent',good:'sel-good',adequate:'sel-adequate',inadequate:'sel-inadequate'}[state.result];
    document.getElementById('res-' + state.result)?.classList.add(cls);
  }

  updateProgress();
}

function findItemById(id) {
  for (const phase of SCHEMA) {
    for (const item of phase.items) {
      if (item.id === id) return item;
    }
  }
  return null;
}

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
buildPage();
loadState();
restoreUI();
startTimer();

// Auto-save every 5 seconds
setInterval(saveState, 5000);

// Save on visibility change
document.addEventListener('visibilitychange', () => {
  if (document.hidden) saveState();
});
</script>
</body>
</html>
