<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DCAS CPG · Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --bg:        #060C14;
      --surface:   rgba(10, 18, 32, 0.82);
      --border:    rgba(56, 120, 220, 0.22);
      --border-focus: rgba(59, 130, 246, 0.7);
      --text:      #E8F0FE;
      --muted:     #6B7FA3;
      --accent:    #3B82F6;
      --accent2:   #1D4ED8;
      --err:       #F87171;
      --ok:        #4ADE80;
      --input-bg:  rgba(4, 10, 20, 0.8);
      --radius:    1.1rem;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
    }

    /* ── Layered ambient background ── */
    .bg-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
    }
    .orb-1 { width: 480px; height: 480px; background: #1D4ED8; top: -120px; left: -100px; animation: drift1 14s ease-in-out infinite alternate; }
    .orb-2 { width: 360px; height: 360px; background: #0E7490; bottom: -80px; right: -80px; animation: drift2 18s ease-in-out infinite alternate; }
    .orb-3 { width: 220px; height: 220px; background: #6D28D9; top: 40%; left: 60%; animation: drift3 22s ease-in-out infinite alternate; }
    @keyframes drift1 { to { transform: translate(30px, 40px); } }
    @keyframes drift2 { to { transform: translate(-25px, -35px); } }
    @keyframes drift3 { to { transform: translate(-40px, 20px); } }

    /* fine grid overlay */
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(56,120,220,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,120,220,0.035) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* ── Card ── */
    .auth-wrap {
      position: relative; z-index: 2;
      width: 100%; max-width: 440px;
      animation: rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 1px solid var(--border);
      border-radius: 1.75rem;
      padding: 2.4rem 2rem 2rem;
      box-shadow: 0 32px 64px -16px rgba(0,0,0,0.7), 0 0 0 0.5px rgba(56,120,220,0.12) inset;
      position: relative;
      overflow: hidden;
    }
    /* subtle top highlight */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(147,197,253,0.35), transparent);
    }

    /* ── Brand ── */
    .brand { text-align: center; margin-bottom: 2rem; }
    .logo-ring {
      width: 62px; height: 62px; border-radius: 50%;
      background: linear-gradient(145deg, #1E3A8A, #3B82F6);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.1rem;
      box-shadow: 0 0 0 8px rgba(59,130,246,0.08), 0 12px 24px -8px rgba(30,58,138,0.6);
      cursor: default; /* admin trigger: 7 clicks */
      user-select: none;
      transition: transform 0.15s;
    }
    .logo-ring:active { transform: scale(0.93); }
    .logo-ring i { font-size: 1.6rem; color: #fff; }
    .brand h1 {
      font-size: 1.75rem; font-weight: 700; letter-spacing: -0.6px;
      background: linear-gradient(135deg, #DBEAFE 20%, #93C5FD 80%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .brand p { color: var(--muted); font-size: 0.88rem; margin-top: 0.35rem; font-weight: 400; }

    /* ── Form ── */
    .form-field { margin-bottom: 1.1rem; }
    .field-label {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.4px;
      color: #93C5FD; margin-bottom: 0.45rem; text-transform: uppercase;
    }
    .field-label i { font-size: 0.78rem; width: 14px; text-align: center; }

    .input-wrap { position: relative; }
    .field-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid rgba(56,120,220,0.25);
      border-radius: var(--radius);
      padding: 0.85rem 3rem 0.85rem 1rem;
      font-size: 0.97rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .field-input::placeholder { color: #3D5070; }
    .field-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.18);
      background: rgba(6, 14, 28, 0.9);
    }
    .field-input.has-error { border-color: rgba(248,113,113,0.6); }
    .field-input.has-error:focus { box-shadow: 0 0 0 3px rgba(248,113,113,0.15); }

    /* password toggle */
    .pw-toggle {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 4px; font-size: 0.95rem; transition: color 0.2s;
      display: flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--accent); }

    /* caps lock warning */
    .caps-warn {
      display: none; align-items: center; gap: 5px;
      font-size: 0.75rem; color: #FCD34D; margin-top: 0.35rem;
      font-family: 'DM Mono', monospace;
    }
    .caps-warn.show { display: flex; }

    /* ── Submit button ── */
    .btn-submit {
      width: 100%; margin-top: 0.75rem;
      padding: 0.95rem 1rem;
      background: linear-gradient(95deg, #2563EB, #1D4ED8);
      border: none; border-radius: 2rem;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem; font-weight: 700; letter-spacing: 0.2px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      cursor: pointer;
      box-shadow: 0 6px 20px -6px rgba(29, 78, 216, 0.7);
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      position: relative; overflow: hidden;
    }
    .btn-submit::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-submit:hover:not(:disabled) {
      background: linear-gradient(95deg, #3B82F6, #1E40AF);
      transform: translateY(-2px);
      box-shadow: 0 14px 28px -10px rgba(29,78,216,0.65);
    }
    .btn-submit:active:not(:disabled) { transform: translateY(1px); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    /* spinner */
    .spinner {
      width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Feedback message ── */
    .feedback {
      margin-top: 0.9rem; padding: 0.65rem 1rem;
      border-radius: 0.85rem; font-size: 0.84rem; font-weight: 500;
      text-align: center; display: none;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform:none; } }
    .feedback.err { display: block; color: var(--err); background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); }
    .feedback.ok  { display: block; color: var(--ok);  background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.2); }

    /* shake on error */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 1.6rem 0 1.4rem;
    }
    .div-line { flex: 1; height: 1px; background: rgba(56,120,220,0.18); }
    .div-text { color: var(--muted); font-size: 0.74rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }

    /* ── Google button wrapper ── */
    .google-wrap { display: flex; justify-content: center; }

    /* ── Footer ── */
    .card-footer {
      text-align: center; margin-top: 1.6rem;
      font-size: 0.85rem; color: var(--muted);
    }
    .card-footer a { color: #60A5FA; font-weight: 600; text-decoration: none; transition: color 0.2s; }
    .card-footer a:hover { color: #93C5FD; }

    /* ── Admin mode visual hint ── */
    .admin-hint {
      position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
      width: 32px; height: 3px; border-radius: 2px 2px 0 0;
      background: linear-gradient(90deg, #7C3AED, #A78BFA);
      opacity: 0; transition: opacity 0.4s;
      pointer-events: none;
    }
    .card.admin-mode .admin-hint { opacity: 1; }
    .card.admin-mode { border-color: rgba(124,58,237,0.4); }

    /* offline badge */
    .offline-badge {
      display: none; align-items: center; gap: 5px;
      font-size: 0.72rem; font-family: 'DM Mono', monospace;
      color: #FCD34D; background: rgba(252,211,77,0.1);
      border: 1px solid rgba(252,211,77,0.2);
      padding: 3px 10px; border-radius: 20px;
      margin: 0 auto 0.9rem; width: fit-content;
    }
    .offline-badge.show { display: flex; }
    .offline-dot { width: 6px; height: 6px; border-radius: 50%; background: #FCD34D; animation: blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.4rem 1.6rem; border-radius: 1.4rem; }
      .brand h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>
</div>
<div class="bg-grid"></div>

<div class="auth-wrap">
  <div class="card" id="mainCard">
    <div class="admin-hint"></div>

    <!-- Brand -->
    <div class="brand">
      <div class="logo-ring" id="logoRing">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h1>DCAS · CPG</h1>
      <p id="cardSubtitle">CPG Provider Login</p>
    </div>

    <!-- Offline indicator -->
    <div class="offline-badge" id="offlineBadge">
      <div class="offline-dot"></div> Offline Mode · Local Auth
    </div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <div class="form-field">
        <div class="field-label"><i class="fas fa-at"></i> Identifier</div>
        <div class="input-wrap">
          <input type="text" id="username" name="username"
            class="field-input" placeholder="Email or username"
            autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
      </div>

      <div class="form-field">
        <div class="field-label"><i class="fas fa-lock"></i> Password</div>
        <div class="input-wrap">
          <input type="password" id="password" name="password"
            class="field-input" placeholder="••••••••"
            autocomplete="current-password">
          <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
        <div class="caps-warn" id="capsWarn"><i class="fas fa-exclamation-triangle"></i> Caps Lock is ON</div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span id="btnLabel">Sign In</span>
        <div class="spinner" id="btnSpinner"></div>
        <i class="fas fa-arrow-right" id="btnArrow"></i>
      </button>
      <div class="feedback" id="feedback" role="alert" aria-live="polite"></div>
    </form>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-text">Or continue with</div>
      <div class="div-line"></div>
    </div>

    <div class="google-wrap">
      <div id="g_id_onload"
           data-client_id="413832763437-48k3r32312e8uevrouha9ss11lk79un9.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleGoogleLogin"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-theme="filled_black"
           data-size="large"
           data-width="260"
           data-shape="pill">
      </div>
    </div>

    <div class="card-footer">
      New here? <a href="signup.html">Register for access <svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-right'/></svg></a>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // NOTE: Authentication is performed exclusively server-side (POST /api/login
  // and /api/google-login). No credentials, hashes, or admin secrets live in
  // the client. The AUTH_KEY below is only a UX hint for the front-end and is
  // NOT a security boundary — server sessions (HttpOnly cookies) are the
  // source of truth for access control. (Secure SDLC §4.4(c))
  const AUTH_KEY = 'dcas_local_auth';
  const SESSION_TTL_MS = 24 * 60 * 60 * 1000; // 24 h

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const form        = document.getElementById('loginForm');
  const usernameEl  = document.getElementById('username');
  const passwordEl  = document.getElementById('password');
  const submitBtn   = document.getElementById('submitBtn');
  const feedback    = document.getElementById('feedback');
  const card        = document.getElementById('mainCard');
  const logoRing    = document.getElementById('logoRing');
  const pwToggle    = document.getElementById('pwToggle');
  const pwIcon      = document.getElementById('pwIcon');
  const capsWarn    = document.getElementById('capsWarn');
  const offlineBadge = document.getElementById('offlineBadge');
  const btnLabel    = document.getElementById('btnLabel');
  const btnSpinner  = document.getElementById('btnSpinner');
  const btnArrow    = document.getElementById('btnArrow');
  const subtitle    = document.getElementById('cardSubtitle');

  // ── Offline detection ─────────────────────────────────────────────────────
  let isOffline = !navigator.onLine;
  function syncOfflineBadge() {
    isOffline = !navigator.onLine;
    offlineBadge.classList.toggle('show', isOffline);
  }
  window.addEventListener('online',  syncOfflineBadge);
  window.addEventListener('offline', syncOfflineBadge);
  syncOfflineBadge();

  // ── Password visibility toggle ────────────────────────────────────────────
  pwToggle.addEventListener('click', () => {
    const show = passwordEl.type === 'password';
    passwordEl.type = show ? 'text' : 'password';
    pwIcon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
  });

  // ── Caps Lock warning ─────────────────────────────────────────────────────
  passwordEl.addEventListener('keyup', e => {
    capsWarn.classList.toggle('show', e.getModifierState?.('CapsLock'));
  });

  // ── Feedback helpers ───────────────────────────────────────────────────────
  function showMsg(text, type = 'err') {
    feedback.textContent = text;
    feedback.className = 'feedback ' + type;
    if (type === 'err') {
      form.classList.add('shake');
      setTimeout(() => form.classList.remove('shake'), 450);
    }
  }
  function clearMsg() { feedback.className = 'feedback'; }

  // ── Button loading state ───────────────────────────────────────────────────
  function setLoading(loading) {
    submitBtn.disabled = loading;
    btnLabel.textContent = loading ? 'Signing in…' : 'Sign In';
    btnSpinner.style.display = loading ? 'block' : 'none';
    btnArrow.style.display   = loading ? 'none'  : 'inline';
  }

  // ── Session helpers ────────────────────────────────────────────────────────
  function setLocalSession(role = 'user', info = {}) {
    localStorage.setItem(AUTH_KEY, JSON.stringify({
      loggedIn: true, role,
      issuedAt: Date.now(),
      expiresAt: Date.now() + SESSION_TTL_MS,
      ...info
    }));
  }

  function redirect(url) {
    showMsg('<svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-check-big'/></svg> Access granted. Loading…', 'ok');
    setTimeout(() => window.location.replace(url || 'index.html'), 900);
  }

  // ─────────────────────────────────────────────────────────────────────────
  //  FORM SUBMIT — server is the single source of truth for authentication
  // ─────────────────────────────────────────────────────────────────────────
  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    clearMsg();

    const username = usernameEl.value.trim();
    const password = passwordEl.value;

    if (!username || !password) {
      showMsg('Please fill in all fields.');
      if (!username) usernameEl.classList.add('has-error');
      if (!password) passwordEl.classList.add('has-error');
      return;
    }
    usernameEl.classList.remove('has-error');
    passwordEl.classList.remove('has-error');

    if (isOffline) {
      showMsg('<svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-x'/></svg> You are offline. Sign-in requires a connection.');
      return;
    }

    setLoading(true);
    showMsg('Authenticating…', 'ok');

    // Authentication is always decided by the server. There is no client-side
    // fallback — that would be a security bypass. (Secure SDLC §4.4(c))
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Requested-With': 'XMLHttpRequest',
        },
        body: JSON.stringify({ username, password }),
        signal: AbortSignal.timeout(8000)
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        setLocalSession(data.role || 'user', { email: data.email });
        redirect(data.redirect || 'index.html');
      } else {
        showMsg('<svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-x'/></svg> ' + (data.error || 'Invalid username or password.'));
        setLoading(false);
      }
    } catch (_) {
      showMsg('<svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-x'/></svg> Server unreachable. Please try again when you have a connection.');
      setLoading(false);
    }
  });

  // clear error styles on input
  [usernameEl, passwordEl].forEach(el => {
    el.addEventListener('input', () => el.classList.remove('has-error'));
  });

  // ─────────────────────────────────────────────────────────────────────────
  //  GOOGLE LOGIN
  // ─────────────────────────────────────────────────────────────────────────
  window.handleGoogleLogin = async function (response) {
    showMsg('Verifying token…', 'ok');
    try {
      const res = await fetch('/api/google-login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Requested-With': 'XMLHttpRequest',
        },
        body: JSON.stringify({ credential: response.credential }),
        signal: AbortSignal.timeout(8000)
      });
      const data = await res.json();
      if (res.ok) {
        setLocalSession(data.role || 'user', { email: data.email });
        redirect(data.redirect || 'index.html');
      } else {
        showMsg('<svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-x'/></svg> ' + (data.error || 'Google authentication failed.'));
      }
    } catch (_) {
      showMsg('<svg class="lucide" width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-x'/></svg> Server unreachable. Google login requires connectivity.');
    }
  };

})();
</script>
</body>
</html>
