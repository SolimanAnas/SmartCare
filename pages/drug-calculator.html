<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DCAS · Drug Calculator 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07111f;--sf:rgba(255,255,255,.055);--sf2:rgba(255,255,255,.09);
  --br:rgba(255,255,255,.10);--br2:rgba(255,255,255,.18);
  --text:#e2e8f0;--muted:#64748b;
  --mono:"DM Mono",monospace;--hdr:60px;--dc:#3b82f6;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,#0f2744,transparent 60%),radial-gradient(ellipse at 80% 100%,#111827,transparent 60%);pointer-events:none;z-index:-1}

/* ── HEADER ─────────────────────────────────────────── */
.app-header{height:var(--hdr);background:rgba(7,17,31,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--br);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:50}
.hdr-back{width:38px;height:38px;border-radius:12px;background:var(--sf2);border:1px solid var(--br);color:var(--text);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:.95rem;flex-shrink:0}
.hdr-back:active{background:var(--br2)}
.hdr-info{flex:1}
.hdr-title{font-size:.95rem;font-weight:800;letter-spacing:-.3px}
.hdr-sub{font-size:.65rem;color:var(--muted);font-weight:400}

/* ── TRUE RESPONSIVE SPLIT LAYOUT ───────────────────── */
.split {
  flex: 1;
  display: flex;
  overflow: hidden;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  position: relative;
}

/* Mobile First: Drug Panel takes full width */
.drug-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: transparent;
  width: 100%;
  overflow: hidden;
}

/* Mobile First: Dose Panel is hidden until selected */
.dose-panel {
  display: none;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px 14px 32px;
  width: 100%;
  flex: 1;
}

/* Mobile Active State */
.split.show-detail .drug-panel { display: none; }
.split.show-detail .dose-panel { 
  display: flex; 
  animation: slideInRight 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Mobile Back Button */
.mob-back-btn {
  display: flex; align-items: center; gap: 8px;
  background: var(--sf); border: 1px solid var(--br);
  color: var(--text); padding: 12px 16px; border-radius: 14px;
  font-weight: 700; font-size: .9rem; margin-bottom: 16px;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.mob-back-btn:active { background: var(--sf2); transform: scale(0.98); }

/* Tablet/Desktop Override */
@media(min-width: 768px) {
  .drug-panel { 
    width: 320px; flex: none; 
    border-right: 1px solid var(--br); 
    display: flex !important; 
    background: rgba(0,0,0,.22); 
  }
  .dose-panel { display: flex !important; padding: 24px; }
  .mob-back-btn { display: none !important; }
}

/* ── SEARCH BAR ─────────────────────────────────────── */
.search-wrap{padding:12px;border-bottom:1px solid var(--br);flex-shrink:0}
.search-inner{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1.5px solid var(--br);border-radius:12px;padding:10px 12px;transition:border-color .2s}
.search-inner:focus-within{border-color:rgba(59,130,246,.5)}
.si-icon{font-size:.9rem;color:var(--muted);flex-shrink:0}
.si-input{flex:1;background:transparent;border:none;outline:none;font-size:.9rem;font-family:inherit;color:var(--text)}
.si-input::placeholder{color:var(--muted)}
.si-clear{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:2px;display:none;font-family:inherit}
.si-clear.show{display:block}

/* ── DRUG LIST ──────────────────────────────────────── */
.drug-scroll{flex:1;overflow-y:auto;padding:4px 10px 20px}
.drug-scroll::-webkit-scrollbar{display:none;}

.cat-hdr{
  display:flex;align-items:center;gap:7px;
  padding:14px 6px 6px;margin-top:4px;
  font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--muted); border-left:3px solid;
}
.drug-item{
  width:100%;text-align:left;background:none;border:none;
  color:var(--text);font-family:inherit;font-size:.95rem;font-weight:500;
  padding:12px 10px;border-radius:12px;cursor:pointer;
  transition:background .12s,color .12s;display:block;line-height:1.3;
}
.drug-item:active{background:var(--sf2)}
.drug-item.active{
  background:color-mix(in srgb,var(--dc) 22%,transparent);
  color:#fff;font-weight:700; border-left:3px solid var(--dc);
}
.drug-item.hidden, .cat-hdr.hidden{display:none}

/* ── DOSE DISPLAY ELEMENTS ──────────────────────────── */
.dose-panel::-webkit-scrollbar{display:none;}

.drug-header{
  background:var(--sf);border:1px solid var(--br);
  border-radius:16px;padding:16px; border-left:4px solid var(--dc);
  transition:border-color .25s;display:none;
}
.drug-header.show{display:block}
.dh-name{font-size:1.1rem;font-weight:800;margin-bottom:4px}
.dh-cat{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}

#ageSection{display:none;flex-direction:column;gap:10px; margin-top: 16px;}
.age-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}
#ageBar{display:flex;flex-wrap:wrap;gap:8px}
.age-chip{
  padding:10px 14px;border-radius:28px; font-size:.8rem;font-weight:600;font-family:inherit;
  border:1.5px solid var(--br);background:var(--sf); color:var(--text);cursor:pointer;white-space:nowrap;
  transition:all .15s;
}
.age-chip:active{transform:scale(.94)}
.age-chip.chip-nr{opacity:.38}
.age-chip.active{
  background:var(--dc);border-color:var(--dc); color:#fff;font-weight:700;
  box-shadow:0 4px 16px color-mix(in srgb,var(--dc) 42%,transparent);
}

.dose-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--muted);text-align:center;padding:40px 20px;font-size:.9rem; min-height:300px;
}
.de-icon{font-size:3rem;opacity:.28;margin-bottom:8px}

.dose-result{display:flex;flex-direction:column;gap:16px; margin-top: 16px; animation:slideUp .28s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* Banners */
.pt-banner{display:flex;align-items:center;gap:12px;border-radius:14px;border:1.5px solid;padding:14px 16px}
.pt-icon{font-size:1.6rem}
.pt-age{font-size:1rem;font-weight:700}
.pt-wt{font-size:.8rem;color:var(--muted);margin-top:2px}

.nr-banner{display:flex;align-items:flex-start;gap:12px;background:rgba(248,113,113,.1);border:1.5px solid rgba(248,113,113,.3);border-radius:14px;padding:14px 16px;color:#fca5a5;font-weight:600;font-size:.9rem}
.nr-banner>span{font-size:1.4rem;flex-shrink:0}
.nr-sub{font-size:.76rem;font-weight:400;opacity:.8;margin-top:4px}

/* Big Dose Cards */
.dose-card{border-radius:20px;overflow:hidden;border:2px solid color-mix(in srgb,var(--dc) 36%,transparent)}
.dose-card.primary{
  background:linear-gradient(155deg,color-mix(in srgb,var(--dc) 28%,#0f1e33),color-mix(in srgb,var(--dc) 10%,#07111f));
  box-shadow:0 6px 32px color-mix(in srgb,var(--dc) 25%,transparent)
}
.dose-card.secondary{background:color-mix(in srgb,var(--dc) 8%,var(--sf))}
.dc-ind{padding:14px 18px 10px;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:1.3px;color:color-mix(in srgb,var(--dc) 82%,#fff);border-bottom:1px solid color-mix(in srgb,var(--dc) 16%,transparent)}
.dc-body{display:flex;align-items:stretch}
.dc-col{flex:1;padding:18px 20px 22px;display:flex;flex-direction:column;gap:4px}
.dc-lbl{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:color-mix(in srgb,var(--dc) 72%,#fff);opacity:.82}
.dc-val{font-size:clamp(2.4rem,10vw,3.6rem);font-weight:900;letter-spacing:-1.5px;line-height:1;color:#fff;word-break:break-word}
.dc-val.vol{color:color-mix(in srgb,var(--dc) 52%,#fff);font-size:clamp(2rem,9vw,3rem)}
.dc-info{padding:10px 20px 16px;border-top:1px solid color-mix(in srgb,var(--dc) 13%,transparent);display:flex;flex-direction:column;gap:6px}
.ir{display:flex;gap:8px;align-items:flex-start;font-size:.8rem;line-height:1.45}
.ir-l{font-weight:700;color:var(--muted);flex-shrink:0;min-width:84px}
.ir-v{color:var(--text)}
</style>
</head>
<body>

<header class="app-header">
  <a class="hdr-back" href="../index.html"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-left'/></svg></a>
  <div class="hdr-info">
    <div class="hdr-title"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#pill'/></svg> Drug Calculator</div>
    <div class="hdr-sub">DCAS CPG 2026 · Medication Matrix</div>
  </div>
</header>

<div class="split" id="mainSplit">

  <div class="drug-panel">
    <div class="search-wrap">
      <div class="search-inner">
        <span class="si-icon"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#search'/></svg></span>
        <input class="si-input" id="drugSearch" type="text"
               placeholder="Search medication…"
               autocomplete="off" autocorrect="off" spellcheck="false"
               oninput="filterDrugs(this.value)">
        <button class="si-clear" id="searchClear" onclick="clearSearch()"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#x'/></svg></button>
      </div>
    </div>
    <div class="drug-scroll" id="drugList">
      </div>
  </div>

  <div class="dose-panel" id="dosePanel">

    <button class="mob-back-btn" onclick="closeDetail()">
      <svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#arrow-left'/></svg> Back to Medications
    </button>

    <div class="drug-header" id="drugHeader">
      <div class="dh-name" id="dhName">—</div>
      <div class="dh-cat" id="dhCat">—</div>
    </div>

    <section id="ageSection">
      <div class="age-label">Age Group</div>
      <div id="ageBar"></div>
    </section>

    <div id="doseArea">
      <div class="dose-empty full">
        <div class="de-icon"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#pill'/></svg></div>
        <strong>Select a medication</strong>
        <span>Choose from the list to see age-based dosing</span>
      </div>
    </div>

  </div>
</div>

<script src="drug-calculator.js"></script>
<script>
/* ──────────────────────────────────────────────────────
   Safeguard: Dummy elements so external JS won't crash
────────────────────────────────────────────────────── */
if (!document.getElementById('drugSelectBtn')) document.body.insertAdjacentHTML('beforeend', '<div id="drugSelectBtn" style="display:none;"></div>');
if (!document.getElementById('pickerModal')) document.body.insertAdjacentHTML('beforeend', '<div id="pickerModal" style="display:none;"></div>');

/* ──────────────────────────────────────────────────────
   Override boot() from drug-calculator.js
────────────────────────────────────────────────────── */
async function boot() {
  try {
    const res  = await fetch('drug-data.json');
    state.data = await res.json();
    buildInlineList();
    // Deep-link: ?drug=DrugName auto-selects on load
    var deepDrug = new URLSearchParams(window.location.search).get('drug');
    if (deepDrug) {
      var btn = document.querySelector('[data-drug="' + deepDrug.replace(/"/g,'') + '"]');
      if (btn) { inlinePick(btn); btn.scrollIntoView({block:'center'}); }
    }
  } catch(e) {
    document.getElementById('doseArea').innerHTML =
      '<div class="dose-empty"><div class="de-icon"><svg class='lucide' width='1em' height='1em' aria-hidden='true' focusable='false'><use href='../icons/sprite.svg#circle-x'/></svg></div><span>' + e.message + '</span></div>';
  }
}

// Escape helper
function esc(str) {
  if (!str) return '';
  return str.replace(/[&<>'"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
}

/* Build the always-visible drug list */
function buildInlineList() {
  const list = document.getElementById('drugList');
  let html = '';
  state.data.categories.forEach(function(cat) {
    html += '<div class="cat-hdr" style="color:' + cat.color + ';border-color:' + cat.color + '" data-cat="' + cat.name + '">'
          + cat.icon + '&nbsp;' + esc(cat.name) + '</div>';
    cat.drugs.forEach(function(name) {
      html += '<button class="drug-item" data-drug="' + esc(name) + '" onclick="inlinePick(this)">'
            + esc(name) + '</button>';
    });
  });
  list.innerHTML = html;
}

/* Drug Selection Handler */
function inlinePick(btnEl) {
  var name = btnEl.dataset.drug;
  var drug = state.data.drugs[name];
  if (!drug) return;

  state.drug = name;
  state.age  = null;

  // Highlight active list item
  document.querySelectorAll('.drug-item').forEach(function(b) {
    b.classList.toggle('active', b.dataset.drug === name);
  });

  // Apply Theme Color
  document.documentElement.style.setProperty('--dc', drug.color);

  // Update Detail Header
  var hdr = document.getElementById('drugHeader');
  document.getElementById('dhName').textContent = name;
  document.getElementById('dhCat').textContent  = drug.category;
  hdr.style.borderLeftColor = drug.color;
  hdr.classList.add('show');

  // Render Logic
  renderAgeBar(drug);
  renderDoseArea(null, null);

  // Trigger Mobile Transition to Detail View
  document.getElementById('mainSplit').classList.add('show-detail');
  document.getElementById('dosePanel').scrollTop = 0;
}

// Map the old pickDrug call to our new function
function pickDrug(btnEl) { inlinePick(btnEl); }

/* Return to list on Mobile */
function closeDetail() {
  document.getElementById('mainSplit').classList.remove('show-detail');
  document.getElementById('drugSearch').focus();
}

/* Search filter */
function filterDrugs(q) {
  q = q.toLowerCase().trim();
  document.getElementById('searchClear').classList.toggle('show', q.length > 0);

  document.querySelectorAll('.drug-item').forEach(function(btn) {
    btn.classList.toggle('hidden', q.length > 0 && !btn.dataset.drug.toLowerCase().includes(q));
  });

  document.querySelectorAll('.cat-hdr').forEach(function(hdr) {
    var el = hdr.nextElementSibling, any = false;
    while (el && el.classList.contains('drug-item')) {
      if (!el.classList.contains('hidden')) any = true;
      el = el.nextElementSibling;
    }
    hdr.classList.toggle('hidden', q.length > 0 && !any);
  });
}

function clearSearch() {
  var inp = document.getElementById('drugSearch');
  inp.value = '';
  filterDrugs('');
  inp.focus();
}

/* Keyboard escape support */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDetail();
});

boot();
</script>
</body>
</html>
