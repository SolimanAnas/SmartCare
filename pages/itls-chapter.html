<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <!-- General SEO Meta Tags -->
    <meta name="description" content="ITLS Course Reviewer. Practice quizzes, read summaries, and view flashcards for ITLS chapters.">
    <meta name="keywords" content="ITLS, Trauma, study aid, EMS, paramedic, quiz, flashcards">
    <meta name="author" content="Soliman Anas">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/png" sizes="32x32" href="../icons/icon-96x96.png">
    <link rel="shortcut icon" href="../icons/icon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SmartCare · ITLS Reviewer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../styles.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#EA580C">
    <link rel="apple-touch-icon" href="../icons/icon.png">
</head>
<body>

<header>
    <div class="header-left">
        <button class="icon-btn" id="homeBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="header-text">
            <h1 id="pageTitle">ITLS Reviewer</h1>
            <p id="pageSubtitle">Chapter Summary & Study</p>
        </div>
    </div>
    <div class="header-right">
        <button class="icon-btn" id="themeToggle" title="Switch Theme"><svg class="lucide" width="1em" height="1em" aria-hidden="true" focusable="false"><use href="../icons/sprite.svg#palette"/></svg></button>
        <div class="stats-badge" id="liveStatsBadge">
            <span><svg class="lucide" width="1em" height="1em" aria-hidden="true" focusable="false"><use href="../icons/sprite.svg#chart-no-axes-column"/></svg> <span id="statsAttempts">0</span></span>
            <div class="stats-divider"></div>
            <span><svg class="lucide" width="1em" height="1em" aria-hidden="true" focusable="false"><use href="../icons/sprite.svg#target"/></svg> <span id="statsCritical">0%</span></span>
        </div>
        <a href="ITLS-reviewer.html" class="icon-btn" id="headerIndexBtn" title="Reviewer Dashboard"><svg class="lucide" width="1em" height="1em" aria-hidden="true" focusable="false"><use href="../icons/sprite.svg#clipboard-list"/></svg></a>
    </div>
</header>

<main id="mainContent">
    <div class="sum-card" style="text-align: center; padding: 40px 20px;">
        <h3 style="color: var(--primary-accent);">Loading Chapter Curriculum...</h3>
        <p style="color: var(--text-secondary);">Preparing summaries, flashcards, and quizzes.</p>
    </div>
</main>

<footer>
    <div>Created by Soliman Anas · for study aid only</div>
    <div><a href="about.html">About & Disclaimer</a> · Intended for educational and clinical revision purposes.</div>
</footer>

<script>
    (function() {
        // Theme initialization and toggle
        const themeBtn = document.getElementById('themeToggle');
        const html = document.documentElement;
        const themes = ['dark', 'amoled', 'light', 'sepia', 'forest'];
        
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            html.setAttribute('data-theme', saved);
        }

        function nextTheme() {
            const current = html.getAttribute('data-theme') || 'dark';
            const currentIndex = themes.indexOf(current);
            const nextIndex = (currentIndex + 1) % themes.length;
            const next = themes[nextIndex];
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        if (themeBtn) {
            themeBtn.addEventListener('click', nextTheme);
        }
        initTheme();

        // Parse query params to load active chapter
        const urlParams = new URLSearchParams(window.location.search);
        const chapterId = urlParams.get('chapter') || 'c01';

        // Load correct stats
        function loadStats() {
            try {
                const data = localStorage.getItem('smartcare_cpg_stats');
                const stats = data ? JSON.parse(data) : { totalAttempts: 0, critical: { total: 0, correct: 0 } };
                const critAcc = stats.critical.total ? Math.round((stats.critical.correct / stats.critical.total) * 100) : 0;
                document.getElementById('statsAttempts').innerText = stats.totalAttempts || 0;
                document.getElementById('statsCritical').innerText = `${critAcc}%`;
            } catch(e) {}
        }
        loadStats();

        // Custom home / back redirect using session storage referrer
        document.getElementById('homeBtn').addEventListener('click', () => {
            const returnUrl = sessionStorage.getItem('smartcare_reviewer_return') || 'ITLS-reviewer.html';
            window.location.href = returnUrl;
        });

        // Set return URL in session storage for backHome actions inside app.js
        sessionStorage.setItem('smartcare_reviewer_return', 'ITLS-reviewer.html');

        // Dynamically load the chapter data script and then the core app reviewer engine
        const dataScript = document.createElement('script');
        dataScript.src = `../courses/itls/chapters/${chapterId}.js`;
        dataScript.onerror = () => {
            document.getElementById('mainContent').innerHTML = `
                <div class="sum-card" style="text-align:center; padding: 40px 20px;">
                    <h3 style="color:var(--red);">Chapter Not Found</h3>
                    <p style="color:var(--text-secondary);">This chapter may still be under construction.</p>
                    <button class="control-btn" onclick="window.location.href='ITLS-reviewer.html'" style="margin-top:20px;">Return to Reviewer</button>
                </div>
            `;
        };
        dataScript.onload = () => {
            // Setup title & metadata before boot
            if (window.CPG_DATA) {
                document.title = `SmartCare · ${window.CPG_DATA.title || 'Reviewer'}`;
                document.getElementById('pageTitle').innerText = window.CPG_DATA.title || 'Reviewer';
                document.getElementById('pageSubtitle').innerText = 'ITLS Chapter Study';
            }
            
            // Now load the main app.js rendering engines
            const appScript = document.createElement('script');
            appScript.src = '../app.js';
            document.body.appendChild(appScript);
        };
        document.body.appendChild(dataScript);
    })();
</script>

</body>
</html>
